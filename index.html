<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.24 - RECOVERY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid var(--ac); }
        .total-box { background: #0f172a; color: #fff; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Toimintatila</label>
        <select id="f-mode" onchange="toggleMode()" class="enter-next">
            <option value="meeting">Tapaaminen (CRM)</option>
            <option value="drive">Pelkkä Ajo</option>
        </select>
        <label>Päivämäärä</label><input type="date" id="f-date" class="enter-next">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-start" class="enter-next"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-end" class="enter-next"></div>
        </div>
        <div id="crm-fields">
            <label>Asiakas / Yritys</label><input type="text" id="f-client" class="enter-next">
            <label>Aihe</label><input type="text" id="f-title" class="enter-next">
        </div>
        <label>Reitti / Osoite</label><input type="text" id="f-route" class="enter-next">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="enter-next"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="enter-next"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type" class="enter-next">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
        </select>
        <label>Päiväraha</label>
        <select id="f-perdiem" class="enter-save">
            <option value="0">Ei PR</option>
            <option value="25">Osa (25€)</option>
            <option value="54">Koko (54€)</option>
        </select>
        <button class="btn-main" onclick="tallennaKaikki()" style="background: var(--success);">TALLENNA (ENTER)</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui">Ladataan...</div></div>
<div id="p-report" class="page"><div id="report-output"></div></div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 1. LATAA DATA HETI PAIKALLISESTA MUISTISTA (EI VIIVETTÄ)
let omatAjot = JSON.parse(localStorage.getItem('paivuri_data')) || [];

// 2. YRITÄ PÄIVITTÄÄ PILVESTÄ TAUSTALLA
db.ref('ajot').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        omatAjot = Object.values(data);
        localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
        paivitaKaikki();
    }
}, (error) => {
    console.log("Firebase virhe, käytetään paikallista:");
    paivitaKaikki();
});

// ENTER-NAVIGAATIO
document.addEventListener('keydown', function(e) {
    if (e.key === "Enter") {
        const active = document.activeElement;
        if (active.classList.contains('enter-save')) {
            tallennaKaikki();
        } else {
            const fields = Array.from(document.querySelectorAll('.enter-next, .enter-save')).filter(el => el.offsetParent !== null);
            const idx = fields.indexOf(active);
            if (idx > -1 && idx < fields.length - 1) {
                e.preventDefault();
                fields[idx + 1].focus();
            }
        }
    }
});

function tallennaKaikki() {
    const id = "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    
    omatAjot.push(ajo);
    localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
    db.ref('ajot/' + id).set(ajo).catch(e => console.log("Ei pilviyhteyttä, tallennettu vain paikallisesti."));
    
    resetForm();
    paivitaKaikki();
    showPage('stats');
}

function paivitaKaikki() {
    let h = "";
    const sorted = [...omatAjot].sort((a,b) => (b.date || "").localeCompare(a.date || ""));
    sorted.forEach(e => {
        h += `<div class="history-item"><b>${e.date || '?'}</b><br>${e.client || 'Nimetön'} (${((e.ke||0)-(e.ks||0)).toFixed(1)} km)</div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Arkisto on tyhjä.";
    
    // Raportti
    const kuu = new Date().toISOString().substring(0, 7);
    let tKm = 0, tOsa = 0, tKoko = 0;
    omatAjot.filter(a => a.date && a.date.startsWith(kuu)).forEach(a => {
        tKm += ((a.ke||0) - (a.ks||0));
        if(a.perdiem == 25) tOsa++; else if(a.perdiem == 54) tKoko++;
    });
    document.getElementById('report-output').innerHTML = `<div class="card"><h3>${kuu}</h3><div class="total-box">Yhteensä: ${(tKm*0.55 + tOsa*25 + tKoko*54).toFixed(2)}€</div></div>`;
}

function resetForm() {
    ['f-client','f-title','f-route','f-ks','f-ke'].forEach(id => document.getElementById(id).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

function toggleMode() {
    document.getElementById('crm-fields').style.display = document.getElementById('f-mode').value === 'meeting' ? 'block' : 'none';
}

// Käynnistys
paivitaKaikki();
resetForm();
toggleMode();
</script>
</body>
</html>
