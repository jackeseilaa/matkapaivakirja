<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v2.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --ac: #2563eb; --tmi: #059669; --border: #000000; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Versionumero ja info */
        .version-bar { background: #f1f5f9; padding: 5px 15px; font-size: 10px; font-weight: 700; color: #64748b; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }

        .tabs { display: flex; background: #000000; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 18px; text-align: center; font-weight: 800; font-size: 13px; cursor: pointer; color: #94a3b8; text-transform: uppercase; }
        .tab.active { color: #ffffff; border-bottom: 5px solid var(--ac); }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .page.active { display: block; }

        /* Lomake */
        .form-row { margin-bottom: 18px; }
        .form-row label { display: block; font-size: 12px; color: #000; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        input, select { background: #fff; border: 2px solid var(--border); color: #000; padding: 14px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; font-weight: 700; }
        .input-group { display: flex; gap: 10px; }
        
        .btn-save { background: #000; color: #fff; border: none; padding: 20px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .btn-reset { background: #fee2e2; color: #dc2626; border: 1px solid #dc2626; padding: 8px; font-size: 11px; border-radius: 5px; margin-top: 20px; font-weight: 700; width: 100%; cursor: pointer; }

        /* Kortit */
        .stat-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 3px solid #000; }
        .stat-card.oy { border-color: var(--ac); }
        .stat-card.tmi { border-color: var(--tmi); }
        .val { font-size: 30px; font-weight: 900; }
        
        .entry-item { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #000; display: flex; justify-content: space-between; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="version-bar">
    <span>VERSIO 2.4</span>
    <span>PÄIVITETTY: 19.3.2026 08:15</span>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Syöttö</div>
    <div class="tab" onclick="switchTab(1)">Koosteet</div>
</div>

<div id="page-input" class="page active">
    <div class="form-row">
        <label>Pvm ja Kellonajat</label>
        <div class="input-group">
            <input type="date" id="f-date">
            <input type="time" id="f-start" value="07:00">
            <input type="time" id="f-end" value="17:00">
        </div>
    </div>
    <div class="form-row">
        <label>Mittarilukemat (Alku / Loppu)</label>
        <div class="input-group">
            <input type="number" id="f-km-start">
            <input type="number" id="f-km-end">
        </div>
    </div>
    <div class="form-row"><label>Otsikko / Tapahtuma</label><input type="text" id="f-title" placeholder="Esim. Taksi 142"></div>
    <div class="form-row"><label>Paikka / Reitti</label><input type="text" id="f-route" placeholder="RMK-HKI-RMK"></div>
    <div class="form-row">
        <label>Tyyppi</label>
        <select id="f-type">
            <option value="Oy">Oy (Matkalasku)</option>
            <option value="Tmi">Tmi (Vähennys)</option>
        </select>
    </div>
    <button class="btn-save" onclick="tallennaAjo()">TALLENNA PILVEEN</button>
    <div id="last-entry-ui"></div>
</div>

<div id="page-stats" class="page">
    <div id="summary-ui"></div>
    <div id="history-ui"></div>
    <button class="btn-reset" onclick="pakotaDatalataus()">PUHDISTA JA LATAA ALKUVUODEN DATA UUDELLEEN</button>
</div>

<script>
// HUOM: Vaihda oma Firebase-configisi tähän!
const firebaseConfig = { apiKey: "...", databaseURL: "...", projectId: "..." };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ALKUVUOSI = [
    { id: 101, date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507284, ke: 507425, type: "Oy" },
    { id: 102, date: "2026-01-14", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507425, ke: 507566, type: "Oy" },
    { id: 103, date: "2026-01-19", title: "Taksi 141", route: "RMK-HKI-RMK", start: "07:30", end: "19:00", ks: 507566, ke: 507707, type: "Oy" },
    { id: 104, date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", start: "10:30", end: "17:00", ks: 507707, ke: 507921, type: "Tmi" },
    { id: 201, date: "2026-02-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "06:30", end: "19:30", ks: 509551, ke: 509692, type: "Oy" },
    { id: 202, date: "2026-02-03", title: "Vakuutus", route: "RMK-TRE-RMK", start: "08:00", end: "16:00", ks: 509692, ke: 509965, type: "Tmi" },
    { id: 203, date: "2026-02-09", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:30", end: "18:00", ks: 511002, ke: 511144, type: "Oy" },
    { id: 204, date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", start: "09:00", end: "19:30", ks: 511630, ke: 511771, type: "Oy" },
    { id: 205, date: "2026-02-17", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:50", end: "18:00", ks: 512019, ke: 512161, type: "Oy" },
    { id: 206, date: "2026-02-18", title: "Taksi 142", route: "RMK-HKI-RMK", start: "04:50", end: "18:00", ks: 512161, ke: 512303, type: "Oy" },
    { id: 301, date: "2026-03-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:00", end: "18:00", ks: 513079, ke: 513221, type: "Oy" },
    { id: 302, date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", start: "09:00", end: "16:00", ks: 513221, ke: 513408, type: "Tmi" },
    { id: 303, date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", start: "07:20", end: "17:30", ks: 514458, ke: 514610, type: "Tmi" }
];

let entries = [];

function init() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    db.ref('ajot').on('value', (snap) => {
        const data = snap.val();
        // Jos dataa ei ole TAI se on vain tyhjiä kokeiluja, tarjotaan latausta
        if (!data || Object.keys(data).length < 5) {
            console.log("Ei dataa pilvessä, odotetaan pakotusta tai automaattilatausta...");
            // Automaattilataus jos täysin tyhjä
            if(!data) initialImport();
        } else {
            entries = Object.values(data).sort((a,b) => b.date < a.date ? -1 : 1);
            render();
            if(entries.length > 0) {
                const uusin = entries[0];
                document.getElementById('f-km-start').value = uusin.ke;
                document.getElementById('f-km-end').value = uusin.ke;
                document.getElementById('last-entry-ui').innerHTML = `<div style="padding:10px; background:#f1f5f9; border-radius:8px; margin-top:15px; border:1px solid #000; font-size:12px"><b>VIIMEISIN:</b> ${uusin.date} | ${uusin.title} (${uusin.ke} km)</div>`;
            }
        }
    });
}

function initialImport() {
    ALKUVUOSI.forEach(item => db.ref('ajot/' + item.id).set(item));
}

function pakotaDatalataus() {
    if(confirm("Tämä poistaa nykyiset merkinnät ja lataa tammikuu-maaliskuu datan uudelleen. Jatketaanko?")) {
        db.ref('ajot').remove().then(() => {
            initialImport();
            alert("Data ladattu!");
        });
    }
}

function switchTab(i) {
    document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
    document.querySelectorAll('.page').forEach((p, idx) => p.classList.toggle('active', idx === i));
}

function tallennaAjo() {
    const id = Date.now();
    const ajo = {
        id: id, date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value, end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-km-start').value) || 0,
        ke: parseFloat(document.getElementById('f-km-end').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        type: document.getElementById('f-type').value
    };
    db.ref('ajot/' + id).set(ajo).then(() => { alert("Tallennettu!"); });
}

function render() {
    let oy = 0, tmi = 0;
    let html = '<h2>HISTORIA</h2>';
    entries.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const [h1, m1] = (e.start || "00:00").split(':').map(Number);
        const [h2, m2] = (e.end || "00:00").split(':').map(Number);
        const hrs = (h2 + m2/60) - (h1 + m1/60);
        const pr = hrs >= 10 ? 54 : (hrs >= 6 ? 25 : 0);
        const total = (km * 0.55) + pr;
        if(e.type === 'Oy') oy += total; else tmi += total;

        html += `<div class="entry-item">
            <div><b>${e.date}</b><br>${e.title}<br><small>${e.route} (${km}km)</small></div>
            <div style="text-align:right"><b>${total.toFixed(2)}€</b><br><small>${e.type}</small></div>
        </div>`;
    });
    document.getElementById('summary-ui').innerHTML = `
        <div class="stat-card oy"><h3>OY KERTYMÄ 2026</h3><div class="val">${oy.toFixed(2)} €</div></div>
        <div class="stat-card tmi"><h3>TMI KERTYMÄ 2026</h3><div class="val">${tmi.toFixed(2)} €</div></div>`;
    document.getElementById('history-ui').innerHTML = html;
}

init();
</script>
</body>
</html>
