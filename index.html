<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.27 - DIAGNOSTIIKKA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; font-family: inherit; font-weight: 600; }
        .btn-main { background: var(--success); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .diag-box { background: #000; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 11px; margin-bottom: 20px; border-left: 5px solid #00ff00; }
        .history-item { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto & Diagnostiikka</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Päivämäärä</label><input type="date" id="f-date">
        <label>Asiakas</label><input type="text" id="f-client">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="text" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="text" id="f-ke"></div>
        </div>
        <button class="btn-main" onclick="tallenna()">TALLENNA</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div class="diag-box" id="diag-out">
        > Järjestelmä alustetaan...<br>
        > Odotetaan yhteyttä...
    </div>
    <div id="history-ui"></div>
</div>

<script>
// KONFIGURAATIO - Kokeillaan täydellisillä tunnuksilla
const firebaseConfig = { 
    projectId: "jsailing-6379b",
    authDomain: "jsailing-6379b.firebaseapp.com"
};

try {
    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    document.getElementById('diag-out').innerHTML += "> Firebase alustettu!<br>";
} catch(e) {
    document.getElementById('diag-out').innerHTML += "> VIRHE: " + e.message + "<br>";
}

let omatAjot = [];

function skannaaJaLataa() {
    const diag = document.getElementById('diag-out');
    diag.innerHTML += "> Etsitään kokoelmaa 'paivuri'...<br>";

    db.collection("paivuri").onSnapshot((snapshot) => {
        diag.innerHTML = "> YHTEYS OK!<br>";
        diag.innerHTML += "> Löydetty dokumentteja: " + snapshot.size + " kpl<br>";
        
        if (snapshot.size === 0) {
            diag.innerHTML += "> VAROITUS: Kokoelma on tyhjä jsailing-6379b projektissa.<br>";
        }

        let h = "";
        omatAjot = [];
        snapshot.forEach((doc) => {
            const d = doc.data();
            const s = parseFloat(String(d.ckm).replace(',','.')) || 0;
            const e = parseFloat(String(d.ckmr).replace(',','.')) || 0;
            
            h += `<div class="history-item"><b>${doc.id}</b><br>${d.apkLahto || 'Ajo'} (${(e-s).toFixed(1)} km)</div>`;
        });
        document.getElementById('history-ui').innerHTML = h;
        diag.innerHTML += "> Arkisto päivitetty.";
    }, (error) => {
        diag.innerHTML += "> LUKUVIRHE: " + error.message + "<br>";
        diag.innerHTML += "> VINKKI: Tarkista Firestore Rules (Rules-välilehti konsolissa).";
    });
}

function tallenna() {
    const pvm = document.getElementById('f-date').value;
    db.collection("paivuri").doc(pvm).set({
        apkLahto: document.getElementById('f-client').value,
        ckm: document.getElementById('f-ks').value,
        ckmr: document.getElementById('f-ke').value,
        at: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => alert("Tallennettu!"));
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
skannaaJaLataa();
</script>
</body>
</html>
