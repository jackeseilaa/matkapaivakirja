<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v3.6</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --del: #ef4444; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 14px; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-family: inherit; font-weight: 600; box-sizing: border-box; }
        .btn-main { background: #000; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 16px; cursor: pointer; }
        .history-item { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; font-size: 13px; }
        .actions { margin-top: 10px; display: flex; gap: 8px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-sm { padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; border: 1px solid #ddd; background: #fff; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="tab-input" onclick="showPage('input')">SYÖTTÖ</div>
    <div class="tab" id="tab-stats" onclick="showPage('stats')">KOOSTEET</div>
</div>

<div id="page-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <div class="form-group"><label>Päivämäärä</label><input type="date" id="f-date"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1" class="form-group"><label>Alku</label><input type="time" id="f-start"></div>
            <div style="flex:1" class="form-group"><label>Loppu</label><input type="time" id="f-end"></div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1" class="form-group"><label>Mittari Alku</label><input type="number" id="f-km-start"></div>
            <div style="flex:1" class="form-group"><label>Mittari Loppu</label><input type="number" id="f-km-end"></div>
        </div>
        <div class="form-group"><label>Asiakas / Otsikko</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Reitti</label><input type="text" id="f-route"></div>
        <div class="form-group">
            <label>Tyyppi</label>
            <select id="f-type"><option value="Oy">Oy</option><option value="Tmi">Tmi</option></select>
        </div>
        <button class="btn-main" id="btn-save-ui" onclick="tallennaAjo()">TALLENNA MATKA</button>
    </div>
</div>

<div id="page-stats" class="page">
    <div id="summary-ui" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px"></div>
    <div id="history-ui"></div>
</div>

<script>
// Firebase-asetukset 
const firebaseConfig = {
  apiKey: "AIzaSyAs79L467-fS7-f4fF_6-uS79L467-i8",
  authDomain: "paivuri-6379b.firebaseapp.com",
  databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "paivuri-6379b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let firebaseEntries = [];

// Haetaan tiedot ja pidetään ne synkronoituina
function init() {
    resetForm();
    db.ref('ajot').on('value', (snap) => {
        const val = snap.val();
        firebaseEntries = val ? Object.values(val) : [];
        paivitaNakyma();
    });
}

function paivitaNakyma() {
    const kaikki = [...firebaseEntries].sort((a,b) => b.date.localeCompare(a.date));
    
    // Automaattinen kilometrien täyttö seuraavaan ajoon
    if(!document.getElementById('f-id').value && kaikki.length > 0) {
        document.getElementById('f-km-start').value = kaikki[0].ke;
        document.getElementById('f-km-end').value = kaikki[0].ke;
    }

    let oy = 0, tmi = 0, html = "<h3>HISTORIA</h3>";
    kaikki.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const eur = km * 0.55;
        if(e.type === 'Oy') oy += eur; else tmi += eur;
        
        html += `<div class="history-item">
            <div style="display:flex; justify-content:space-between">
                <div><b>${e.date}</b><br>${e.title}</div>
                <div style="text-align:right"><b>${eur.toFixed(2)}€</b><br><small>${km} km</small></div>
            </div>
            <div class="actions">
                <button class="btn-sm" onclick='muokkaa(${JSON.stringify(e)})'>MUOKKAA</button>
                <button class="btn-sm" style="color:red" onclick="poista(${e.id})">POISTA</button>
            </div>
        </div>`;
    });

    document.getElementById('summary-ui').innerHTML = `
        <div style="background:#fff; padding:15px; border-radius:12px; text-align:center; border:1px solid #eee">
            <label>Oy</label><br><b>${oy.toFixed(2)}€</b>
        </div>
        <div style="background:#fff; padding:15px; border-radius:12px; text-align:center; border:1px solid #eee">
            <label>Tmi</label><br><b>${tmi.toFixed(2)}€</b>
        </div>`;
    document.getElementById('history-ui').innerHTML = html;
}

function tallennaAjo() {
    const id = document.getElementById('f-id').value || Date.now();
    const ajo = {
        id: parseInt(id),
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-km-start').value) || 0,
        ke: parseFloat(document.getElementById('f-km-end').value) || 0,
        title: document.getElementById('f-title').value || "",
        route: document.getElementById('f-route').value || "",
        type: document.getElementById('f-type').value
    };

    // Varmistetaan, että päivämäärä on valittu
    if(!ajo.date) { alert("Valitse päivämäärä!"); return; }

    db.ref('ajot/' + id).set(ajo)
        .then(() => {
            alert("Matka tallennettu!");
            resetForm();
            showPage('stats');
        })
        .catch(err => alert("Virhe: " + err.message));
}

function muokkaa(e) {
    document.getElementById('f-id').value = e.id;
    document.getElementById('f-date').value = e.date;
    document.getElementById('f-start').value = e.start;
    document.getElementById('f-end').value = e.end;
    document.getElementById('f-km-start').value = e.ks;
    document.getElementById('f-km-end').value = e.ke;
    document.getElementById('f-title').value = e.title;
    document.getElementById('f-route').value = e.route;
    document.getElementById('f-type').value = e.type;
    document.getElementById('btn-save-ui').innerText = "PÄIVITÄ MATKA";
    showPage('input');
}

function poista(id) {
    if(confirm("Poistetaanko matka?")) db.ref('ajot/' + id).remove();
}

function resetForm() {
    const nyt = new Date().toISOString().split('T')[0];
    document.getElementById('f-id').value = "";
    document.getElementById('f-date').value = nyt;
    document.getElementById('f-title').value = "";
    document.getElementById('f-route').value = "";
    document.getElementById('btn-save-ui').innerText = "TALLENNA MATKA";
}

function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.getElementById('tab-' + p).classList.add('active');
}

init();
</script>
</body>
</html>
