<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v4.2 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 14px; cursor: pointer; margin-top: 10px; }
        .btn-sub { background: #f1f5f9; color: #475569; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .month-header { background: #1e293b; padding: 10px 15px; border-radius: 8px; font-weight: 800; font-size: 12px; margin: 25px 0 10px 0; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-val { font-size: 16px; font-weight: 800; color: var(--ac); display: block; margin-top: 4px; }
        .badge-cal { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #dcfce7; color: #166534; font-weight: 800; margin-top: 5px; display: inline-block; border: 1px solid #bbf7d0; }
        .actions { margin-top: 12px; display: flex; gap: 8px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Uusi Ajo</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Koosteet</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <div class="form-group"><label>Päivämäärä</label><input type="date" id="f-date"></div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>Lähtö</label><input type="time" id="f-start"></div>
            <div style="flex:1"><label>Paluu</label><input type="time" id="f-end"></div>
        </div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <div class="form-group"><label>Kohde / Asiakas</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Reitti</label><input type="text" id="f-route"></div>
        <div class="form-group">
            <label>Päiväraha (2026)</label>
            <select id="f-perdiem">
                <option value="0">Ei päivärahaa</option>
                <option value="25">Osapäiväraha (>6h) 25€</option>
                <option value="54">Kokopäiväraha (>10h) 54€</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tyyppi</label>
            <select id="f-type">
                <option value="Oy">Oy (Matkalasku)</option>
                <option value="Tmi">Tmi (Vähennys)</option>
            </select>
        </div>
        <button class="btn-main" id="save-btn" onclick="tallennaMatka()">TALLENNA MATKA</button>
        <button class="btn-sub" id="cancel-btn" style="display:none; width:100%; margin-top:10px" onclick="resetForm()">PERUUTA MUOKKAUS</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div id="summary-ui" class="stat-grid"></div>
    <div id="history-ui"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const KM_HINTA = 0.55;

// DATAN NOUTO CSV-TIEDOSTOISTASI (Tammikuu-Maaliskuu 2026)
const CSV_DATA = [
    { id: "c1", date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507284, ke: 507425, type: "Oy", perdiem: 54, exported: true },
    { id: "c2", date: "2026-01-14", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507425, ke: 507566, type: "Oy", perdiem: 54, exported: true },
    { id: "c3", date: "2026-01-19", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507566, ke: 507707, type: "Oy", perdiem: 54, exported: true },
    { id: "c4", date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 507707, ke: 507921, type: "Tmi", perdiem: 25, exported: true },
    { id: "c5", date: "2026-02-02", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 509551, ke: 509692, type: "Oy", perdiem: 54, exported: true },
    { id: "c6", date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", ks: 511630, ke: 511771, type: "Oy", perdiem: 54, exported: true },
    { id: "c7", date: "2026-02-18", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 512161, ke: 512303, type: "Oy", perdiem: 54, exported: true },
    { id: "c8", date: "2026-03-02", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 513079, ke: 513221, type: "Oy", perdiem: 54, exported: true },
    { id: "c9", date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 513221, ke: 513408, type: "Tmi", perdiem: 0, exported: true },
    { id: "c10", date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", ks: 514458, ke: 514610, type: "Tmi", perdiem: 54, exported: true }
];

let fireAjot = [];

function init() {
    // Kellonaikojen automaattinen asetus
    const nyt = new Date();
    document.getElementById('f-date').value = nyt.toISOString().split('T')[0];
    document.getElementById('f-start').value = nyt.getHours().toString().padStart(2,'0') + ":00";
    document.getElementById('f-end').value = (nyt.getHours()+1).toString().padStart(2,'0') + ":00";

    // Lataa paikallinen varakopio jos Firebase ei vastaa
    const local = localStorage.getItem('varmuuskopio_ajot');
    if(local) fireAjot = JSON.parse(local);

    db.ref('ajot').on('value', (snap) => {
        const val = snap.val();
        if(val) {
            fireAjot = Object.values(val);
            localStorage.setItem('varmuuskopio_ajot', JSON.stringify(fireAjot));
        }
        paivitaNakyma();
    });
}

function paivitaNakyma() {
    let kaikki = [...fireAjot];
    CSV_DATA.forEach(c => { if(!kaikki.find(k => k.id === c.id)) kaikki.push(c); });
    kaikki.sort((a,b) => b.date.localeCompare(a.date));

    // Asetetaan seuraava mittarilukema automaattisesti
    if(kaikki.length > 0 && !document.getElementById('f-id').value) {
        document.getElementById('f-ks').value = kaikki[0].ke;
        document.getElementById('f-ke').value = kaikki[0].ke;
    }

    let oySum = 0, tmiSum = 0, currentMonth = "";
    let html = "";

    kaikki.forEach(e => {
        const m = new Date(e.date).toLocaleString('fi-FI', { month: 'long', year: 'numeric' });
        if (m !== currentMonth) {
            currentMonth = m;
            html += `<div class="month-header"><span>${m.toUpperCase()}</span></div>`;
        }

        const km = (e.ke - e.ks) || 0;
        const rahaa = (km * KM_HINTA) + parseFloat(e.perdiem || 0);
        if(e.type === 'Oy') oySum += rahaa; else tmiSum += rahaa;

        html += `
        <div class="history-item">
            <div style="display:flex; justify-content:space-between">
                <div>
                    <small>${e.date}</small><br>
                    <b>${e.title}</b><br>
                    <small>${e.route}</small>
                    ${e.exported ? '<br><span class="badge-cal">✓ KALENTERISSA</span>' : ''}
                </div>
                <div style="text-align:right">
                    <b style="color:var(--ac)">${rahaa.toFixed(2)}€</b><br>
                    <small>${km} km</small>
                </div>
            </div>
            <div class="actions">
                <button class="btn-sub" onclick="muokkaa('${e.id}')">Muokkaa</button>
                <button class="btn-sub" style="color:var(--danger)" onclick="poista('${e.id}')">Poista</button>
                <button class="btn-sub" onclick="vieKalenteriin('${e.id}')">Kalenteri</button>
            </div>
        </div>`;
    });

    document.getElementById('summary-ui').innerHTML = `
        <div class="stat-box"><label>OY YHTEENSÄ</label><span class="stat-val">${oySum.toFixed(2)}€</span></div>
        <div class="stat-box"><label>TMI VÄHENNYS</label><span class="stat-val" style="color:var(--success)">${tmiSum.toFixed(2)}€</span></div>
    `;
    document.getElementById('history-ui').innerHTML = html;
}

function tallennaMatka() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0,
        type: document.getElementById('f-type').value,
        exported: false
    };

    db.ref('ajot/' + id).set(ajo).then(() => {
        alert("Tallennettu!");
        resetForm();
        showPage('stats');
    }).catch(err => {
        // Jos tallennus epäonnistuu (offline), tallennetaan ainakin paikallisesti
        fireAjot.push(ajo);
        localStorage.setItem('varmuuskopio_ajot', JSON.stringify(fireAjot));
        paivitaNakyma();
        showPage('stats');
    });
}

function muokkaa(id) {
    let kaikki = [...fireAjot, ...CSV_DATA];
    const a = kaikki.find(x => x.id == id);
    if(!a) return;
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-title').value = a.title;
    document.getElementById('f-route').value = a.route;
    document.getElementById('f-perdiem').value = a.perdiem;
    document.getElementById('f-type').value = a.type;
    document.getElementById('save-btn').innerText = "PÄIVITÄ TIEDOT";
    document.getElementById('cancel-btn').style.display = "block";
    showPage('input');
}

function poista(id) {
    if(confirm("Poistetaanko?")) {
        db.ref('ajot/' + id).remove();
        fireAjot = fireAjot.filter(x => x.id !== id);
        localStorage.setItem('varmuuskopio_ajot', JSON.stringify(fireAjot));
        paivitaNakyma();
    }
}

function vieKalenteriin(id) {
    db.ref('ajot/' + id).update({ exported: true });
}

function resetForm() {
    document.getElementById('f-id').value = "";
    document.getElementById('save-btn').innerText = "TALLENNA MATKA";
    document.getElementById('cancel-btn').style.display = "none";
    init();
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

init();
</script>
</body>
</html>
