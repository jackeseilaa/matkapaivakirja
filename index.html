<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Päivyri v5.24 - EMERGENCY RECOVERY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .item { padding: 10px; border-bottom: 1px solid #ccc; background: #fff; margin-top: 5px; }
        button { padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        #debug { font-size: 10px; color: red; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Päivyri Arkisto</h2>
    <div id="history-ui">Ladataan tietoja...</div>
    <hr>
    <button onclick="lisaaTesti()" style="background: #e2e8f0;">LISÄÄ TESTIMERKINTÄ</button>
    <button onclick="tyhjennaNaytto()" style="font-size: 10px;">Päivitä näkymä</button>
</div>

<div id="debug"></div>

<script>
// Firebase-asetukset
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function log(msg) { document.getElementById('debug').innerHTML += msg + "<br>"; }

// 1. Haetaan paikallinen data heti
let omatAjot = JSON.parse(localStorage.getItem('paivuri_data')) || [];
log("Paikallisia rivejä löytyi: " + omatAjot.length);

// 2. Kuunnellaan pilveä
db.ref('ajot').on('value', (snapshot) => {
    const data = snapshot.val();
    log("Pilvestä saatiin vastaus.");
    if (data) {
        omatAjot = Object.values(data);
        localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
        log("Pilvirivejä löytyi: " + omatAjot.length);
        paivitaNaytto();
    } else {
        log("Pilvi on tyhjä.");
        paivitaNaytto();
    }
}, (error) => {
    log("VIRHE: " + error.message);
});

function paivitaNaytto() {
    let h = "";
    if (omatAjot.length === 0) {
        h = "Ei dataa löytynyt mistään.";
    } else {
        omatAjot.sort((a,b) => (b.date || "").localeCompare(a.date || "")).forEach(e => {
            h += `<div class="item"><b>${e.date || 'Ei pvm'}</b>: ${e.client || 'Ajo'} (${(e.ke - e.ks) || 0} km)</div>`;
        });
    }
    document.getElementById('history-ui').innerHTML = h;
}

function lisaaTesti() {
    const id = "test_" + Date.now();
    const testiAjo = {
        id: id,
        date: new Date().toISOString().split('T')[0],
        client: "TESTI-AJO",
        ks: 0,
        ke: 10,
        perdiem: 0
    };
    db.ref('ajot/' + id).set(testiAjo)
        .then(() => alert("Testi tallennettu pilveen!"))
        .catch(e => alert("Tallennusvirhe: " + e.message));
}

function tyhjennaNaytto() { location.reload(); }

// Ensimmäinen ajo
paivitaNaytto();
</script>
</body>
</html>
