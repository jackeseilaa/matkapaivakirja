<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v6.10 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid var(--ac); }
        .footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 9px; font-weight: 700; position: fixed; bottom: 0; width: 100%; background: var(--bg); border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body onkeypress="checkEnter(event)">

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <label>Päivämäärä</label><input type="date" id="f-date">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-start"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-end"></div>
        </div>
        <label>Asiakas / Yritys</label><input type="text" id="f-client" placeholder="Kirjoita ja paina Enter">
        <label>Reitti</label><input type="text" id="f-route">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <button class="btn-main" onclick="tallennaFirestoreen()" style="background: var(--success); width:100%;">TALLENNA (ENTER)</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui">Ladataan arkistoa...</div></div>
<div id="p-report" class="page"><div id="report-output"></div></div>

<div class="footer" id="versio-info">Päivyri v6.10 PRO | Yhteys: Haetaan...</div>

<script>
// KÄYTETÄÄN LÄHETTÄMIÄSI ASETUKSIA
const firebaseConfig = {
  apiKey: "AIzaSyCjoOqjTZxYoTA0b9HN-QAUB79pqHj5uBc",
  authDomain: "paivuri.firebaseapp.com",
  projectId: "paivuri",
  storageBucket: "paivuri.firebasestorage.app",
  messagingSenderId: "602861240385",
  appId: "1:602861240385:web:f215c3b44388ddfe9346c0"
};

// Alustus
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let omatAjot = [];

// ENTER-TOIMINTO
function checkEnter(e) {
    if (e.key === "Enter") {
        tallennaFirestoreen();
    }
}

function lataaData() {
    // Haetaan 'ajot'-kokoelmasta
    db.collection("ajot").orderBy("date", "desc").onSnapshot((snapshot) => {
        omatAjot = [];
        let h = "";
        let count = 0;
        let tkm = 0;

        snapshot.forEach((doc) => {
            const e = doc.data();
            e.id = doc.id;
            omatAjot.push(e);
            const km = (parseFloat(e.ke) || 0) - (parseFloat(e.ks) || 0);
            tkm += km;
            h += `<div class="history-item">
                    <small>${e.date}</small><br>
                    <b>${e.client || 'Nimetön'}</b> (${km.toFixed(1)} km)
                  </div>`;
            count++;
        });

        document.getElementById('history-ui').innerHTML = h || "Arkisto on tyhjä.";
        document.getElementById('versio-info').innerHTML = `Päivyri v6.10 | Arkistossa ${count} ajoa`;
        
        // Päivitä raportti automaattisesti
        document.getElementById('report-output').innerHTML = `
            <div class="card">
                <h3>Yhteenveto</h3>
                <p>Ajoja yhteensä: <b>${count} kpl</b></p>
                <p>Kilometrit: <b>${tkm.toFixed(1)} km</b></p>
            </div>`;
    }, (error) => {
        document.getElementById('versio-info').innerHTML = "VIRHE: " + error.message;
    });
}

function tallennaFirestoreen() {
    const id = document.getElementById('f-id').value || "ajo_" + Date.now();
    const ajo = {
        date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "Nimetön",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        timestamp: new Date()
    };

    db.collection("ajot").doc(id).set(ajo).then(() => {
        alert("Tallennettu!");
        // Tyhjennetään lomake
        ['f-client', 'f-route', 'f-ks', 'f-ke'].forEach(f => document.getElementById(f).value = "");
        showPage('stats');
    }).catch(err => alert("Tallennusvirhe: " + err.message));
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

// Asetetaan oletuspäivä
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

// Käynnistys
lataaData();
</script>
</body>
</html>
