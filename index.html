<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.24 - FIRESTORE VAKAA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid var(--ac); }
        .total-box { background: #0f172a; color: #fff; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Asiakas / Lähtö</label><input type="text" id="f-client" class="nav-f">
        <label>Päivämäärä</label><input type="date" id="f-date" class="nav-f">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="nav-f"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="nav-f"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type" class="nav-f">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
        </select>
        <button class="btn-main" onclick="tallennaFirestoreen()" style="background: var(--success);">TALLENNA (ENTER)</button>
    </div>
</div>

<div id="p-stats" class="page">
    <h2>Arkisto (Pilvi)</h2>
    <div id="history-ui">Haetaan dataa...</div>
</div>

<div id="p-report" class="page"><div id="report-output"></div></div>

<script>
// ASETUKSET KUVAKAAPPAUKSESI MUKAAN
const firebaseConfig = { projectId: "paivuri-6379b" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// HAETAAN DATA FIRESTORESTA
function lataaData() {
    db.collection("paivuri").onSnapshot((querySnapshot) => {
        let h = "";
        let tKm = 0;
        let dataLista = [];

        querySnapshot.forEach((doc) => {
            const d = doc.data();
            const pvm = doc.id; // Kuvassasi ID on päivämäärä
            const km = (parseFloat(d.ckmr) || 0) - (parseFloat(d.ckm) || 0);
            tKm += km;
            
            dataLista.push({pvm, client: d.apkLahto || 'Ajo', km});
        });

        // Lajittelu uusimman mukaan
        dataLista.sort((a,b) => b.pvm.localeCompare(a.pvm)).forEach(e => {
            h += `<div class="history-item"><b>${e.pvm}</b><br>${e.client} (${e.km.toFixed(1)} km)</div>`;
        });

        document.getElementById('history-ui').innerHTML = h || "Ei merkintöjä.";
        document.getElementById('report-output').innerHTML = `<div class="card"><h3>Yhteensä: ${tKm.toFixed(1)} km</h3></div>`;
    });
}

function tallennaFirestoreen() {
    const pvm = document.getElementById('f-date').value;
    if(!pvm) return alert("Päivämäärä puuttuu!");

    // Tallennetaan kuvakaappauksesi mukaisilla kenttänimillä
    db.collection("paivuri").doc(pvm).set({
        apkLahto: document.getElementById('f-client').value,
        ckm: document.getElementById('f-ks').value,
        ckmr: document.getElementById('f-ke').value,
        drole: document.getElementById('f-type').value,
        at: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        resetForm();
        showPage('stats');
    });
}

function resetForm() {
    document.getElementById('f-client').value = "";
    document.getElementById('f-ks').value = "";
    document.getElementById('f-ke').value = "";
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

// Käynnistys
resetForm();
lataaData();
</script>
</body>
</html>
