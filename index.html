<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.32 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --cal: #4285f4; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 18px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        
        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        .card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 16px; }
        
        .btn-main { background: #000; color: #fff; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; font-size: 15px; }
        .btn-cal { background: var(--cal); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .history-item { background: #fff; padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-left: 6px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .history-item.oy { border-left-color: var(--ac); }
        .history-item.tmi { border-left-color: var(--success); }
        
        .total-box { background: #0f172a; color: #fff; padding: 24px; border-radius: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .diag { font-size: 9px; color: #94a3b8; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Päivämäärä</label>
        <input type="date" id="f-date">
        
        <label>Asiakas / Yritys</label>
        <input type="text" id="f-client" placeholder="Asiakkaan nimi">
        
        <div style="display:flex; gap:12px">
            <div style="flex:1">
                <label>KM Alku</label>
                <input type="number" id="f-ks" placeholder="0">
            </div>
            <div style="flex:1">
                <label>KM Loppu</label>
                <input type="number" id="f-ke" placeholder="0">
            </div>
        </div>
        
        <label>Tyyppi</label>
        <select id="f-type">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
        </select>
        
        <button class="btn-cal" onclick="window.open('https://calendar.google.com/')">📅 AVAA KALENTERI</button>
        <button class="btn-main" onclick="tallenna()" style="background: var(--success);">TALLENNA ARKISTOON</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div id="diag-out" class="diag">Yhdistetään...</div>
    <div id="history-ui">Haetaan dataa...</div>
</div>

<div id="p-report" class="page">
    <div id="report-output"></div>
</div>

<script>
// TÄRKEÄ: Käytetään projektia "paivuri" ja kokeillaan molempia tapoja
const firebaseConfig = { projectId: "paivuri" };
firebase.initializeApp(firebaseConfig);

let db;
try {
    // Yritetään ensin sitä erikoiskantaa, joka näkyi kuvassasi
    db = firebase.app().firestore("paivuri");
} catch(e) {
    // Jos se epäonnistuu, käytetään oletusta
    db = firebase.firestore();
}

let omatAjot = [];

function lataaData() {
    db.collection("paivuri").onSnapshot((snapshot) => {
        document.getElementById('diag-out').innerHTML = "Yhteys: OK | Dokumentteja: " + snapshot.size;
        omatAjot = [];
        let h = "";
        
        snapshot.forEach((doc) => {
            const d = doc.data();
            const s = parseFloat(d.ckm) || 0;
            const e = parseFloat(d.ckmr) || 0;
            omatAjot.push({ id: doc.id, date: doc.id, client: d.apkLahto || "Ajo", km: e-s, type: d.drole || "Oy" });
        });

        omatAjot.sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
            h += `<div class="history-item ${e.type.toLowerCase()}">
                <div><small>${e.date}</small><br><b>${e.client}</b></div>
                <div style="text-align:right"><b>${e.km.toFixed(1)}</b><br><small>km</small></div>
            </div>`;
        });
        document.getElementById('history-ui').innerHTML = h || "Ei merkintöjä.";
        paivitaRaportti();
    }, (error) => {
        document.getElementById('diag-out').innerHTML = "Virhe: " + error.message;
    });
}

function tallenna() {
    const pvm = document.getElementById('f-date').value;
    if(!pvm) return alert("Pvm puuttuu!");
    
    db.collection("paivuri").doc(pvm).set({
        apkLahto: document.getElementById('f-client').value,
        ckm: document.getElementById('f-ks').value,
        ckmr: document.getElementById('f-ke').value,
        drole: document.getElementById('f-type').value,
        at: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        alert("Tallennettu!");
        showPage('stats');
    });
}

function paivitaRaportti() {
    const kuu = new Date().toISOString().substring(0, 7);
    let tKm = 0;
    omatAjot.filter(a => a.date.startsWith(kuu)).forEach(a => tKm += a.km);
    document.getElementById('report-output').innerHTML = `
        <div class="card">
            <h3>Yhteenveto ${kuu}</h3>
            <div class="total-box">
                <div class="total-row"><span>Kilometrit:</span><b>${tKm.toFixed(1)} km</b></div>
                <div class="total-row"><span>Korvaus:</span><b>${(tKm * 0.55).toFixed(2)} €</b></div>
            </div>
        </div>`;
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
lataaData();
</script>
</body>
</html>
