<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --sur: #181c27; --ac: #2563eb; --tx: #e8eaf0; --mu: #94a3b8;
        }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--tx); margin: 0; padding: 0; }
        
        /* Välilehdet */
        .tabs { display: flex; background: var(--sur); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; color: var(--mu); }
        .tab.active { color: var(--tx); border-bottom: 3px solid var(--ac); }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Syöttölomake riveittäin */
        .form-row { margin-bottom: 18px; }
        .form-row label { display: block; font-size: 11px; color: var(--mu); text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .input-group { display: flex; gap: 10px; }
        input, select, textarea { 
            background: #232936; border: 1px solid rgba(255,255,255,0.1); color: white; 
            padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box;
        }
        
        /* Viimeisin syöttö -kortti */
        .last-entry { 
            background: linear-gradient(135deg, #1e293b, #111827); padding: 15px; 
            border-radius: 12px; margin-top: 25px; border: 1px solid rgba(37, 99, 235, 0.3);
        }
        .last-entry h4 { margin: 0 0 10px 0; font-size: 12px; color: var(--ac); }

        /* Koosteet */
        .stat-card { background: var(--sur); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--ac); }
        .stat-card h3 { margin: 0; font-size: 13px; color: var(--mu); }
        .stat-card .val { font-size: 28px; font-weight: 800; margin-top: 5px; }

        .btn-save { 
            background: var(--ac); color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: 800; width: 100%; font-size: 16px; margin-top: 10px;
        }
        
        .btn-cal { padding: 8px; border-radius: 6px; border: 1px solid var(--ac); background: none; color: var(--ac); font-weight: 600; cursor: pointer; }
        .btn-cal.synced { border-color: #444; color: #666; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">SYÖTTÖ</div>
    <div class="tab" onclick="switchTab(1)">KOOSTEET</div>
</div>

<div id="page-input" class="page active">
    <div class="form-row">
        <label>Päivämäärä ja kellonajat</label>
        <div class="input-group">
            <input type="date" id="f-date">
            <input type="time" id="f-start">
            <input type="time" id="f-end">
        </div>
    </div>

    <div class="form-row">
        <label>Mittarilukemat (Alku / Loppu)</label>
        <div class="input-group">
            <input type="number" id="f-km-start" placeholder="Alku km">
            <input type="number" id="f-km-end" placeholder="Loppu km">
        </div>
    </div>

    <div class="form-row">
        <label>Tapahtuman otsikko</label>
        <input type="text" id="f-title" placeholder="Esim. Taksi 154 / Asiakas X">
    </div>

    <div class="form-row">
        <label>Paikkatieto</label>
        <input type="text" id="f-loc" placeholder="Kaupunki / Toimipiste">
    </div>

    <div class="form-row">
        <label>Reitti (Mistä - Mihin)</label>
        <input type="text" id="f-route" placeholder="RMK - HKI - RMK">
    </div>

    <div class="form-row">
        <label>Laskutustyyppi</label>
        <select id="f-type">
            <option value="Oy">Oy (Matkalasku)</option>
            <option value="Tmi">Tmi (Vähennys)</option>
            <option value="Oma">Oma ajo</option>
        </select>
    </div>

    <button class="btn-save" onclick="tallennaPilveen()">TALLENNA AJOPÄIVÄKIRJAAN</button>

    <div id="last-entry-container"></div>
</div>

<div id="page-stats" class="page">
    <div id="stats-content">
        </div>
    <div style="margin-top:20px" id="history-list">
        </div>
</div>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = {
    apiKey: "AIzaSy...", // Lisää omasi tähän
    databaseURL: "https://paivuri-xxxx.firebasedatabase.app",
    projectId: "paivuri-xxxx"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let entries = [];

function switchTab(index) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === index));
}

// ALUSTUS
function init() {
    const now = new Date();
    document.getElementById('f-date').value = now.toISOString().split('T')[0];
    document.getElementById('f-start').value = now.getHours().toString().padStart(2,'0') + ":00";
    document.getElementById('f-end').value = (now.getHours()+1).toString().padStart(2,'0') + ":00";

    db.ref('ajot').on('value', (snapshot) => {
        const data = snapshot.val();
        entries = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
        render();
        paivitaKilometrit();
    });
}

function paivitaKilometrit() {
    if(entries.length > 0) {
        const viimeisin = entries[0]; // Koska lajiteltu uusin ensin
        document.getElementById('f-km-start').value = viimeisin.ke;
        document.getElementById('f-km-end').value = viimeisin.ke;
        
        // Näytetään viimeisin tieto syöttösivulla
        document.getElementById('last-entry-container').innerHTML = `
            <div class="last-entry">
                <h4>VIIMEISIN SYÖTTÖ: ${viimeisin.date}</h4>
                <div style="font-size:14px; font-weight:600">${viimeisin.title}</div>
                <div style="font-size:12px; color:var(--mu)">${viimeisin.route} (${viimeisin.ke - viimeisin.ks} km)</div>
            </div>
        `;
    }
}

function tallennaPilveen() {
    const id = Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-km-start').value) || 0,
        ke: parseFloat(document.getElementById('f-km-end').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        loc: document.getElementById('f-loc').value,
        route: document.getElementById('f-route').value,
        type: document.getElementById('f-type').value,
        calSynced: false
    };

    db.ref('ajot/' + id).set(ajo).then(() => {
        alert("Tallennettu!");
        document.getElementById('f-title').value = "";
    });
}

function vieKalenteriin(id) {
    const e = entries.find(x => x.id == id);
    const dateStr = e.date.replace(/-/g,'');
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.title)}&dates=${dateStr}T${e.start.replace(':','')}00Z/${dateStr}T${e.end.replace(':','')}00Z&details=${encodeURIComponent(e.route)}`;
    window.open(url, '_blank');
    db.ref('ajot/' + id).update({ calSynced: true });
}

function render() {
    // Koosteet
    let oy = 0, tmi = 0;
    entries.forEach(e => {
        const km = e.ke - e.ks;
        const [h1, m1] = e.start.split(':').map(Number);
        const [h2, m2] = e.end.split(':').map(Number);
        const hrs = (h2 + m2/60) - (h1 + m1/60);
        const pr = hrs >= 10 ? 54 : (hrs >= 6 ? 25 : 0);
        const sum = (km * 0.55) + pr;
        if(e.type === 'Oy') oy += sum;
        if(e.type === 'Tmi') tmi += sum;
    });

    document.getElementById('stats-content').innerHTML = `
        <div class="stat-card"><h3>OY MATKALASKUT (KK)</h3><div class="val">${oy.toFixed(2)} €</div></div>
        <div class="stat-card" style="border-left-color:var(--tmi)"><h3>TMI VÄHENNYS (KK)</h3><div class="val">${tmi.toFixed(2)} €</div></div>
    `;

    // Lista historiaan
    let html = '<h3>Historia</h3>';
    entries.forEach(e => {
        html += `
            <div style="background:var(--sur); padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-size:11px; color:var(--mu)">${e.date}</div>
                    <div style="font-weight:600">${e.title}</div>
                    <div style="font-size:12px; color:var(--mu)">${e.route}</div>
                </div>
                <button class="btn-cal ${e.calSynced?'synced':''}" onclick="vieKalenteriin(${e.id})">
                    ${e.calSynced ? 'Viety ✓' : 'GCal'}
                </button>
            </div>
        `;
    });
    document.getElementById('history-list').innerHTML = html;
}

init();
</script>
</body>
</html>
