        <select id="f-mode" onchange="toggleMode()" class="nav-f">
            <option value="meeting">Tapaaminen</option>
            <option value="drive">Ajo</option>
        </select>
        <label>Pvm</label><input type="date" id="f-date" class="nav-f">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Alku</label><input type="time" id="f-start" class="nav-f"></div>
            <div style="flex:1"><label>Loppu</label><input type="time" id="f-end" class="nav-f"></div>
        </div>
        <div id="crm-fields">
            <label>Asiakas</label><input type="text" id="f-client" class="nav-f">
            <label>Aihe</label><input type="text" id="f-title" class="nav-f">
        </div>
        <label>Reitti</label><input type="text" id="f-route" class="nav-f">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="nav-f"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="nav-f"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type" class="nav-f">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
        </select>
        <label>Päiväraha</label>
        <select id="f-perdiem" class="nav-f last-f">
            <option value="0">Ei</option>
            <option value="25">25€</option>
            <option value="54">54€</option>
        </select>
        <button class="btn-main" onclick="tallennaKaikki()" style="background: var(--success);">TALLENNA (ENTER)</button>
    </div>
</div>

<div id="p-stats" class="page"><h3>Arkisto (Pilvi)</h3><div id="history-ui">Ladataan pilvestä...</div></div>
<div id="p-report" class="page"><div id="report-output"></div></div>

<script>
// Firebase Alustus
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let omatAjot = [];

// HAETAAN DATA PILVESTÄ HETI
db.ref('ajot').on('value', (snapshot) => {
    const data = snapshot.val();
    omatAjot = data ? Object.values(data) : [];
    localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
    paivitaKaikki();
});

// NAVIGOINTI (NUOLET & ENTER)
document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    if (!active.classList.contains('nav-f')) return;
    const fields = Array.from(document.querySelectorAll('.nav-f')).filter(el => el.offsetParent !== null);
    const i = fields.indexOf(active);

    if (e.key === "Enter") {
        if (active.classList.contains('last-f')) tallennaKaikki();
        else { e.preventDefault(); fields[i+1]?.focus(); }
    } else if (e.key === "ArrowDown") { e.preventDefault(); fields[i+1]?.focus(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); fields[i-1]?.focus(); }
});

function tallennaKaikki() {
    const id = "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        client: document.getElementById('f-client').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        type: document.getElementById('f-type').value,
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0
    };
    db.ref('ajot/' + id).set(ajo);
    resetForm();
    showPage('stats');
}

function paivitaKaikki() {
    let h = "";
    [...omatAjot].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e => {
        h += `<div class="history-item"><b>${e.date}</b> | ${e.client} (${e.ke-e.ks} km)</div>`;
    });
    document.getElementById('history-ui').innerHTML = h || "Ei merkintöjä pilvessä.";
}

function resetForm() {
    ['f-client','f-title','f-route','f-ks','f-ke'].forEach(id => document.getElementById(id).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

function toggleMode() {
    document.getElementById('crm-fields').style.display = document.getElementById('f-mode').value === 'meeting' ? 'block' : 'none';
}

resetForm(); toggleMode();
</script>
</body>
</html>
