<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajopäiväkirja 2026 — Jarmo Aaltonen</title>
    <style>
        :root { --primary: #4285F4; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; }
        
        /* Syöttölomake */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; background: #f1f3f4; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input, select, textarea { padding: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        textarea { grid-column: span 2; height: 80px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: 600; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; grid-column: 1 / -1; font-size: 16px; }
        .btn-main:hover { background: #357ae8; }
        
        /* Taulukko */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background: #f8f9fa; color: #5f6368; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f3f4; }
        tr:hover { background: #f8f9fa; }
        
        /* Tunnisteet ja napit */
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .oy { background: #e8f0fe; color: #1967d2; }
        .tmi { background: #e6f4ea; color: #137333; }
        .oma { background: #f3e8fd; color: #9333ea; }
        .btn-cal { background: #fff; border: 1px solid #dadce0; color: #1a73e8; font-size: 12px; }
        .btn-cal:hover { background: #f1f3f4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Matka- ja ajopäiväkirja 2026</h1>

    <div class="form-grid">
        <input type="date" id="f-date" value="2026-03-19">
        <input type="text" id="f-title" placeholder="Tapahtuma (esim. Taksi 154 tai Asiakas)">
        <input type="text" id="f-loc" placeholder="Sijainti / Reitti">
        <input type="time" id="f-start">
        <input type="time" id="f-end">
        <input type="number" id="f-km" placeholder="Km">
        <select id="f-type">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
            <option value="Oma">Oma</option>
        </select>
        <textarea id="f-desc" placeholder="Lisätiedot ja tapahtuman kuvaus..."></textarea>
        <button class="btn-main" onclick="addEntry()">Lisää uusi tapahtuma</button>
    </div>

    <h2>Tapahtumahistoria</h2>
    <div class="table-wrapper">
        <table id="entryTable">
            <thead>
                <tr>
                    <th>Päivä</th>
                    <th>Tapahtuma & Sijainti</th>
                    <th>Aika</th>
                    <th>Tyyppi</th>
                    <th>Km</th>
                    <th>Toiminnot</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
// TUOTU DATA CSV-TIEDOSTOISTA
const initialData = [
    { date: "2026-03-11", title: "Agentti-matka", loc: "Riihimäki - Lahti", start: "07:20", end: "17:30", type: "Oma", km: 0, desc: "Lahti / Agentti" },
    { date: "2026-03-10", title: "Oma ajo", loc: "Riihimäki", start: "", end: "", type: "Oma", km: 152, desc: "" },
    { date: "2026-03-05", title: "Agentti-matka", loc: "Riihimäki - Lahti", start: "07:15", end: "17:30", type: "Oma", km: 0, desc: "Päiväraha ilman km-korvausta" },
    { date: "2026-03-04", title: "Työajo", loc: "Riihimäki", start: "", end: "", type: "Tmi", km: 187, desc: "" },
    { date: "2026-03-02", title: "Helsinki-ajo", loc: "Riihimäki - Helsinki", start: "05:00", end: "18:00", type: "Oy", km: 142, desc: "Taksi" },
    { date: "2026-02-18", title: "Taksi 142", loc: "RMK - HKI - RMK", start: "04:50", end: "18:00", type: "Oy", km: 142, desc: "Pitkä päivä" },
    { date: "2026-02-17", title: "Taksi 142", loc: "RMK - HKI - RMK", start: "05:50", end: "18:00", type: "Oy", km: 142, desc: "Taksi" },
    { date: "2026-02-14", title: "Venemessut", loc: "Messukeskus, HKI", start: "09:00", end: "19:30", type: "Oy", km: 142, desc: "Venemessuedustus" },
    { date: "2026-02-11", title: "Agentti-matka", loc: "Riihimäki - Heinola", start: "10:00", end: "17:00", type: "Tmi", km: 233, desc: "Heinola/Agentti" },
    { date: "2026-02-04", title: "Agentti-matka", loc: "RMK - Padasjoki", start: "", end: "", type: "Tmi", km: 225, desc: "Padasjoki/Agentti" },
    { date: "2026-02-03", title: "Meklaritilaisuus", loc: "Nokia Arena, Tre", start: "", end: "", type: "Tmi", km: 273, desc: "IF/meklaritilaisuus" },
    { date: "2026-02-02", title: "Taksi 142", loc: "RMK - HKI - RMK", start: "06:30", end: "19:30", type: "Oy", km: 142, desc: "Taksi" },
    { date: "2026-01-26", title: "Taksi 141", loc: "RMK - HKI - RMK", start: "06:10", end: "16:50", type: "Oy", km: 141, desc: "Taksi" },
    { date: "2026-01-23", title: "Taksi 141", loc: "RMK - HKI - RMK", start: "05:30", end: "14:30", type: "Oy", km: 141, desc: "Taksi" },
    { date: "2026-01-20", title: "Vakuutusajo", loc: "RMK - TRE - RMK", start: "10:30", end: "17:00", type: "Tmi", km: 214, desc: "Huoltolux Oy, TRE" },
    { date: "2026-01-19", title: "Taksi 141", loc: "RMK - HKI - RMK", start: "07:30", end: "19:00", type: "Oy", km: 141, desc: "Taksi" },
    { date: "2026-01-15", title: "Taksi 141", loc: "RMK - HKI - RMK", start: "05:30", end: "16:30", type: "Oy", km: 141, desc: "Taksi" },
    { date: "2026-01-14", title: "Taksi 141", loc: "RMK - HKI - RMK", start: "05:30", end: "16:30", type: "Oy", km: 141, desc: "Taksi" }
];

let entries = JSON.parse(localStorage.getItem('jarmo_diary_2026')) || initialData;

function addEntry() {
    const e = {
        id: Date.now(),
        date: document.getElementById('f-date').value,
        title: document.getElementById('f-title').value,
        loc: document.getElementById('f-loc').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        km: document.getElementById('f-km').value || 0,
        type: document.getElementById('f-type').value,
        desc: document.getElementById('f-desc').value
    };
    if(!e.title || !e.date) return alert("Lisää vähintään päivä ja otsikko!");
    entries.unshift(e);
    saveAndRender();
}

function saveAndRender() {
    localStorage.setItem('jarmo_diary_2026', JSON.stringify(entries));
    render();
}

function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    entries.forEach(e => {
        const tr = document.createElement('tr');
        const gCalUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.title)}&location=${encodeURIComponent(e.loc)}&details=${encodeURIComponent(e.desc + ' | Km: ' + e.km)}&dates=${e.date.replace(/-/g,'')}T${(e.start||'09:00').replace(':','')}00/${e.date.replace(/-/g,'')}T${(e.end||'10:00').replace(':','')}00`;
        
        tr.innerHTML = `
            <td>${new Date(e.date).toLocaleDateString('fi-FI')}</td>
            <td><strong>${e.title}</strong><br><small style="color:gray">${e.loc}</small></td>
            <td>${e.start || '--'} - ${e.end || '--'}</td>
            <td><span class="tag ${e.type.toLowerCase()}">${e.type}</span></td>
            <td>${e.km} km</td>
            <td><button class="btn-cal" onclick="window.open('${gCalUrl}')">📅 Kalenteriin</button></td>
        `;
        tbody.appendChild(tr);
    });
}

render();
</script>

</body>
</html>
