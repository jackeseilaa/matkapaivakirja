<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.31 - PROJECT FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 18px 10px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        .btn-main { background: var(--success); color: #fff; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; font-size: 15px; }
        .history-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 6px solid #2563eb; display: flex; justify-content: space-between; align-items: center; }
        .total-box { background: #0f172a; color: #fff; padding: 20px; border-radius: 15px; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Päivämäärä</label><input type="date" id="f-date">
        <label>Asiakas / Yritys</label><input type="text" id="f-client" placeholder="Asiakkaan nimi">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type"><option value="Oy">Oy</option><option value="Tmi">Tmi</option></select>
        <button class="btn-main" onclick="tallenna()">TALLENNA ARKISTOON</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui">Haetaan arkistoa...</div></div>

<div id="p-report" class="page"><div id="report-output"></div></div>

<script>
// TÄMÄ ON NYT SE OIKEA ID KUVASI PERUSTEELLA
const firebaseConfig = { projectId: "paivuri" }; 
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let omatAjot = [];

function lataaData() {
    db.collection("paivuri").onSnapshot((snapshot) => {
        omatAjot = [];
        let h = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const s = parseFloat(d.ckm) || 0;
            const e = parseFloat(d.ckmr) || 0;
            omatAjot.push({ date: doc.id, client: d.apkLahto || "Ajo", km: e-s, type: d.drole || "Oy" });
        });
        omatAjot.sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
            h += `<div class="history-item" style="border-left-color:${e.type==='Oy'?'#2563eb':'#10b981'}">
                <div><small>${e.date}</small><br><b>${e.client}</b></div>
                <div><b>${e.km.toFixed(1)} km</b></div>
            </div>`;
        });
        document.getElementById('history-ui').innerHTML = h || "Arkisto on tyhjä tässä projektissa.";
        paivitaRaportti();
    });
}

function tallenna() {
    const pvm = document.getElementById('f-date').value;
    if(!pvm) return alert("Pvm puuttuu!");
    db.collection("paivuri").doc(pvm).set({
        apkLahto: document.getElementById('f-client').value,
        ckm: document.getElementById('f-ks').value,
        ckmr: document.getElementById('f-ke').value,
        drole: document.getElementById('f-type').value,
        at: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => { alert("Tallennettu!"); showPage('stats'); });
}

function paivitaRaportti() {
    const kuu = new Date().toISOString().substring(0, 7);
    let tKm = 0;
    omatAjot.filter(a => a.date.startsWith(kuu)).forEach(a => tKm += a.km);
    document.getElementById('report-output').innerHTML = `
        <div class="card">
            <h3>Yhteenveto ${kuu}</h3>
            <div class="total-box">
                <div class="total-row"><span>Kilometrit:</span><b>${tKm.toFixed(1)} km</b></div>
                <div class="total-row"><span>Korvaus (0.55€):</span><b>${(tKm * 0.55).toFixed(2)}€</b></div>
            </div>
        </div>`;
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
lataaData();
</script>
</body>
</html>
