<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v5.24 - Firestore Recovery</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --success: #10b981; --cal: #4285f4; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; margin-bottom: 12px; }
        input:focus, select:focus { border-color: var(--ac); outline: none; background: #eff6ff; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid var(--ac); }
        .total-box { background: #0f172a; color: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .total-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 9px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Arkisto</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportit</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <label>Päivämäärä</label><input type="date" id="f-date" class="nav-f">
        <label>Asiakas / Kohde</label><input type="text" id="f-client" class="nav-f" placeholder="Esim. Yritys Oy">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks" class="nav-f"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke" class="nav-f"></div>
        </div>
        <label>Tyyppi</label>
        <select id="f-type" class="nav-f">
            <option value="Oy">Oy</option>
            <option value="Tmi">Tmi</option>
        </select>
        <label>Päiväraha</label>
        <select id="f-perdiem" class="nav-f last-f">
            <option value="ei">Ei PR</option>
            <option value="osa">Osa (25€)</option>
            <option value="koko">Koko (54€)</option>
        </select>
        <button class="btn-main" onclick="tallennaFirestoreen()" style="background: var(--success);">TALLENNA ARKISTOON (ENTER)</button>
    </div>
</div>

<div id="p-stats" class="page"><div id="history-ui">Ladataan dataa pilvestä...</div></div>
<div id="p-report" class="page"><div id="report-output"></div></div>

<div class="footer">Versio 5.24 - FIRESTORE RECOVERY | 19.3.2026</div>

<script>
// ASETUKSET FIRESTORELLE
const firebaseConfig = { projectId: "paivuri-6379b" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let omatAjot = [];

// 1. HAETAAN DATA FIRESTORESTA (Kokoelma: paivuri)
function lataaData() {
    db.collection("paivuri").onSnapshot((snapshot) => {
        omatAjot = [];
        let h = "";
        
        snapshot.forEach((doc) => {
            const d = doc.data();
            const pvm = doc.id; // Dokumentin ID on päivämäärä
            
            // Lasketaan km kuvasi kentistä ckmr ja ckm
            const km = (parseFloat(d.ckmr) || 0) - (parseFloat(d.ckm) || 0);
            
            omatAjot.push({
                pvm: pvm,
                client: d.apkLahto || 'Ajo',
                km: km,
                type: d.drole || 'Oy',
                dieta: d.dieta || 'ei'
            });
        });

        // Lajitellaan pvm mukaan
        omatAjot.sort((a,b) => b.pvm.localeCompare(a.pvm)).forEach(e => {
            h += `<div class="history-item"><b>${e.pvm}</b><br>${e.client} (${e.km.toFixed(1)} km)</div>`;
        });

        document.getElementById('history-ui').innerHTML = h || "Ei merkintöjä.";
        paivitaRaportti();
    });
}

// 2. TALLENNUS FIRESTOREEN (Kuvasi mukaisilla kentillä)
function tallennaFirestoreen() {
    const pvm = document.getElementById('f-date').value;
    if(!pvm) return alert("Valitse päivämäärä!");

    db.collection("paivuri").doc(pvm).set({
        apkLahto: document.getElementById('f-client').value,
        ckm: document.getElementById('f-ks').value,
        ckmr: document.getElementById('f-ke').value,
        drole: document.getElementById('f-type').value,
        dieta: document.getElementById('f-perdiem').value,
        at: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        resetForm();
        showPage('stats');
    }).catch(e => alert("Virhe: " + e.message));
}

function paivitaRaportti() {
    const kuu = new Date().toISOString().substring(0, 7);
    let tKm = 0;
    omatAjot.filter(a => a.pvm.startsWith(kuu)).forEach(a => tKm += a.km);
    
    document.getElementById('report-output').innerHTML = `
        <div class="card">
            <h3>Yhteenveto ${kuu}</h3>
            <div class="total-box">
                <div class="total-row"><span>Km yhteensä:</span><b>${tKm.toFixed(1)} km</b></div>
                <div class="total-row"><span>Korvaus (0.55€):</span><b>${(tKm * 0.55).toFixed(2)} €</b></div>
            </div>
        </div>`;
}

// ENTER-NAVIGAATIO
document.addEventListener('keydown', (e) => {
    if (e.key === "Enter") {
        const active = document.activeElement;
        const fields = Array.from(document.querySelectorAll('.nav-f'));
        const idx = fields.indexOf(active);
        if (idx > -1 && idx < fields.length - 1) {
            e.preventDefault();
            fields[idx + 1].focus();
        } else if (active.classList.contains('last-f')) {
            tallennaFirestoreen();
        }
    }
});

function resetForm() {
    ['f-client','f-ks','f-ke'].forEach(id => document.getElementById(id).value = "");
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

// Käynnistys
resetForm();
lataaData();
</script>
</body>
</html>
