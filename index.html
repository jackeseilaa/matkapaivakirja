<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; --sur: #f8fafc; --text: #000000; --mu: #475569; 
            --ac: #2563eb; --tmi: #059669; --border: #000000; 
        }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Välilehdet - Musta tausta, valkoinen teksti */
        .tabs { display: flex; background: #000000; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 20px; text-align: center; font-weight: 800; font-size: 14px; cursor: pointer; color: #94a3b8; text-transform: uppercase; }
        .tab.active { color: #ffffff; border-bottom: 5px solid var(--ac); }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .page.active { display: block; }

        /* Lomake - Vahvat reunat */
        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; font-size: 13px; color: #000; text-transform: uppercase; margin-bottom: 6px; font-weight: 800; }
        .input-group { display: flex; gap: 10px; }
        input, select { 
            background: #ffffff; border: 2px solid var(--border); color: #000; 
            padding: 14px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; font-weight: 700;
        }
        
        .btn-save { 
            background: #000; color: #fff; border: none; padding: 22px; 
            border-radius: 12px; font-weight: 800; width: 100%; font-size: 18px; cursor: pointer;
        }

        /* Koosteet */
        .stat-card { 
            background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
            border: 3px solid #000; 
        }
        .stat-card.oy { border-color: var(--ac); }
        .stat-card.tmi { border-color: var(--tmi); }
        .stat-card h3 { margin: 0; font-size: 14px; font-weight: 800; }
        .stat-card .val { font-size: 34px; font-weight: 900; margin-top: 5px; }

        .entry-item { 
            background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; 
            border: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Syöttö</div>
    <div class="tab" onclick="switchTab(1)">Koosteet</div>
</div>

<div id="page-input" class="page active">
    <div class="form-row">
        <label>Pvm ja Kellonajat</label>
        <div class="input-group">
            <input type="date" id="f-date">
            <input type="time" id="f-start" value="07:00">
            <input type="time" id="f-end" value="17:00">
        </div>
    </div>
    <div class="form-row"><label>Mittari (Alku / Loppu)</label>
        <div class="input-group">
            <input type="number" id="f-km-start"><input type="number" id="f-km-end">
        </div>
    </div>
    <div class="form-row"><label>Otsikko / Tapahtuma</label><input type="text" id="f-title"></div>
    <div class="form-row"><label>Reitti / Paikka</label><input type="text" id="f-route"></div>
    <div class="form-row"><label>Tyyppi</label>
        <select id="f-type"><option value="Oy">Oy (Matkalasku)</option><option value="Tmi">Tmi (Vähennys)</option></select>
    </div>
    <button class="btn-save" onclick="tallennaAjo()">TALLENNA AJOPÄIVÄKIRJAAN</button>
    <div id="last-entry-ui"></div>
</div>

<div id="page-stats" class="page">
    <div id="summary-ui"></div>
    <div id="history-ui"></div>
</div>

<script>
const firebaseConfig = { /* OMA CONFIGISI */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// TÄYSI DATA CSV-TIEDOSTOISTASI
const initialData = [
    // TAMMIKUU
    { id: 101, date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507284, ke: 507425, type: "Oy" },
    { id: 102, date: "2026-01-14", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507425, ke: 507566, type: "Oy" },
    { id: 103, date: "2026-01-19", title: "Taksi 141", route: "RMK-HKI-RMK", start: "07:30", end: "19:00", ks: 507566, ke: 507707, type: "Oy" },
    { id: 104, date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", start: "10:30", end: "17:00", ks: 507707, ke: 507921, type: "Tmi" },
    // HELMIKUU
    { id: 201, date: "2026-02-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "06:30", end: "19:30", ks: 509551, ke: 509692, type: "Oy" },
    { id: 202, date: "2026-02-03", title: "Vakuutus", route: "RMK-TRE-RMK", start: "08:00", end: "16:00", ks: 509692, ke: 509965, type: "Tmi" },
    { id: 203, date: "2026-02-09", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:30", end: "18:00", ks: 511002, ke: 511144, type: "Oy" },
    { id: 204, date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", start: "09:00", end: "19:30", ks: 511630, ke: 511771, type: "Oy" },
    { id: 205, date: "2026-02-17", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:50", end: "18:00", ks: 512019, ke: 512161, type: "Oy" },
    { id: 206, date: "2026-02-18", title: "Taksi 142", route: "RMK-HKI-RMK", start: "04:50", end: "18:00", ks: 512161, ke: 512303, type: "Oy" },
    // MAALISKUU
    { id: 301, date: "2026-03-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:00", end: "18:00", ks: 513079, ke: 513221, type: "Oy" },
    { id: 302, date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", start: "09:00", end: "16:00", ks: 513221, ke: 513408, type: "Tmi" },
    { id: 303, date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", start: "07:20", end: "17:30", ks: 514458, ke: 514610, type: "Tmi" }
];

let entries = [];

function init() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    db.ref('ajot').on('value', (snap) => {
        const data = snap.val();
        if (!data) { initialData.forEach(d => db.ref('ajot/' + d.id).set(d)); }
        else {
            entries = Object.values(data).sort((a,b) => b.id - a.id);
            render();
            if(entries.length > 0) {
                document.getElementById('f-km-start').value = entries[0].ke;
                document.getElementById('f-km-end').value = entries[0].ke;
            }
        }
    });
}

function switchTab(i) {
    document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
    document.querySelectorAll('.page').forEach((p, idx) => p.classList.toggle('active', idx === i));
}

function tallennaAjo() {
    const id = Date.now();
    const ajo = {
        id: id, date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value, end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-km-start').value), ke: parseFloat(document.getElementById('f-km-end').value),
        title: document.getElementById('f-title').value, route: document.getElementById('f-route').value,
        type: document.getElementById('f-type').value
    };
    db.ref('ajot/' + id).set(ajo).then(() => { alert("Tallennettu!"); });
}

function render() {
    let oy = 0, tmi = 0;
    let html = '<h2 style="border-bottom:3px solid #000">HISTORIA</h2>';
    entries.forEach(e => {
        const km = e.ke - e.ks;
        const [h1, m1] = e.start.split(':').map(Number);
        const [h2, m2] = (e.end || "00:00").split(':').map(Number);
        const hrs = (h2 + m2/60) - (h1 + m1/60);
        const pr = hrs >= 10 ? 54 : (hrs >= 6 ? 25 : 0);
        const total = (km * 0.55) + pr;
        if(e.type === 'Oy') oy += total; else tmi += total;

        html += `<div class="entry-item">
            <div><b>${e.date}</b><br>${e.title}<br><small>${e.route} (${km}km)</small></div>
            <div style="text-align:right"><b>${total.toFixed(2)}€</b><br><small>${e.type}</small></div>
        </div>`;
    });
    document.getElementById('summary-ui').innerHTML = `
        <div class="stat-card oy"><h3>OY YHTEENSÄ 2026</h3><div class="val">${oy.toFixed(2)} €</div></div>
        <div class="stat-card tmi"><h3>TMI YHTEENSÄ 2026</h3><div class="val">${tmi.toFixed(2)} €</div></div>`;
    document.getElementById('history-ui').innerHTML = html;
}

init();
</script>
</body>
</html>
