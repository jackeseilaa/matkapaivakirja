<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v2.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --ac: #2563eb; --tmi: #059669; --border: #000000; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .version-bar { background: #000; padding: 6px 15px; font-size: 11px; font-weight: 700; color: #fff; display: flex; justify-content: space-between; }
        .tabs { display: flex; background: #eee; border-bottom: 2px solid #000; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #666; text-transform: uppercase; }
        .tab.active { color: #000; background: #fff; border-bottom: 5px solid var(--ac); }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .form-row { margin-bottom: 15px; }
        .form-row label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 5px; }
        input, select { border: 2px solid #000; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; font-weight: 700; }
        .btn-save { background: var(--ac); color: #fff; border: 2px solid #000; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 18px; cursor: pointer; }
        .stat-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 3px solid #000; }
        .entry-item { border-bottom: 2px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; font-size: 14px; }
        .btn-reset { background: #ff0000; color: #fff; border: 2px solid #000; padding: 10px; font-weight: 800; width: 100%; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="version-bar">
    <span>VERSIO 2.5 (Vahva Data-Link)</span>
    <span>19.3.2026 08:45</span>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Syöttö</div>
    <div class="tab" onclick="switchTab(1)">Koosteet</div>
</div>

<div id="page-input" class="page active">
    <div class="form-row">
        <label>Pvm / Lähtö / Paluu</label>
        <div style="display:flex; gap:5px">
            <input type="date" id="f-date">
            <input type="time" id="f-start" value="07:00">
            <input type="time" id="f-end" value="17:00">
        </div>
    </div>
    <div class="form-row">
        <label>Mittari Alku / Loppu</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="f-km-start">
            <input type="number" id="f-km-end">
        </div>
    </div>
    <div class="form-row"><label>Otsikko / Tapahtuma</label><input type="text" id="f-title" placeholder="Esim. Taksi 142"></div>
    <div class="form-row"><label>Reitti</label><input type="text" id="f-route" placeholder="RMK-HKI-RMK"></div>
    <div class="form-row">
        <label>Tyyppi</label>
        <select id="f-type"><option value="Oy">Oy</option><option value="Tmi">Tmi</option></select>
    </div>
    <button class="btn-save" onclick="tallennaAjo()">TALLENNA MATKA</button>
</div>

<div id="page-stats" class="page">
    <div id="summary-ui"></div>
    <div id="history-ui" style="margin-top:20px"></div>
    <button class="btn-reset" onclick="pakotaDatalataus()">POISTA KAIKKI JA PALAUTA ALKUVUOSI</button>
</div>

<script>
// --- KONFIGURAATIO ---
const firebaseConfig = { /* LISÄÄ TÄHÄN OMA CONFIGISI */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// POIMITTU REAKTIIVISET TIEDOT PDF-KOODISTASI
const ALKUVUOSI = [
    { id: 101, date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507284, ke: 507425, type: "Oy" },
    { id: 102, date: "2026-01-14", title: "Taksi 141", route: "RMK-HKI-RMK", start: "05:30", end: "16:30", ks: 507425, ke: 507566, type: "Oy" },
    { id: 103, date: "2026-01-19", title: "Taksi 141", route: "RMK-HKI-RMK", start: "07:30", end: "19:00", ks: 507566, ke: 507707, type: "Oy" },
    { id: 104, date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", start: "10:30", end: "17:00", ks: 507707, ke: 507921, type: "Tmi" },
    { id: 201, date: "2026-02-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "06:30", end: "19:30", ks: 509551, ke: 509692, type: "Oy" },
    { id: 202, date: "2026-02-03", title: "Vakuutus", route: "RMK-TRE-RMK", start: "08:00", end: "16:00", ks: 509692, ke: 509965, type: "Tmi" },
    { id: 203, date: "2026-02-09", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:30", end: "18:00", ks: 511002, ke: 511144, type: "Oy" },
    { id: 204, date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", start: "09:00", end: "19:30", ks: 511630, ke: 511771, type: "Oy" },
    { id: 205, date: "2026-02-17", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:50", end: "18:00", ks: 512019, ke: 512161, type: "Oy" },
    { id: 206, date: "2026-02-18", title: "Taksi 142", route: "RMK-HKI-RMK", start: "04:50", end: "18:00", ks: 512161, ke: 512303, type: "Oy" },
    { id: 301, date: "2026-03-02", title: "Taksi 142", route: "RMK-HKI-RMK", start: "05:00", end: "18:00", ks: 513079, ke: 513221, type: "Oy" },
    { id: 302, date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", start: "09:00", end: "16:00", ks: 513221, ke: 513408, type: "Tmi" },
    { id: 303, date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", start: "07:20", end: "17:30", ks: 514458, ke: 514610, type: "Tmi" }
];

let entries = [];

function init() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    db.ref('ajot').on('value', (snap) => {
        const data = snap.val();
        // Pakotetaan alkuvuosi jos tietokanta on lähes tyhjä
        if (!data || Object.keys(data).length < 2) {
            initialImport();
        } else {
            entries = Object.values(data).sort((a,b) => b.date.localeCompare(a.date));
            render();
            if(entries.length > 0) {
                document.getElementById('f-km-start').value = entries[0].ke;
                document.getElementById('f-km-end').value = entries[0].ke;
            }
        }
    });
}

function initialImport() {
    ALKUVUOSI.forEach(item => db.ref('ajot/' + item.id).set(item));
}

function pakotaDatalataus() {
    if(confirm("HUOM! Tämä poistaa KAIKKI merkinnät ja palauttaa alkuvuoden tilanteen. Haluatko varmasti jatkaa?")) {
        db.ref('ajot').remove().then(() => {
            initialImport();
            alert("Tietokanta nollattu ja alkuvuosi ladattu!");
        });
    }
}

function switchTab(i) {
    document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
    document.querySelectorAll('.page').forEach((p, idx) => p.classList.toggle('active', idx === i));
}

function tallennaAjo() {
    const id = Date.now();
    const ajo = {
        id: id, date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value, end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-km-start').value) || 0,
        ke: parseFloat(document.getElementById('f-km-end').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        type: document.getElementById('f-type').value
    };
    db.ref('ajot/' + id).set(ajo).then(() => { alert("Tallennettu!"); });
}

function render() {
    let oy = 0, tmi = 0;
    let html = '<h3 style="border-bottom:3px solid #000; padding-bottom:5px">AJOHISTORIA</h3>';
    
    entries.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const [h1, m1] = (e.start || "00:00").split(':').map(Number);
        const [h2, m2] = (e.end || "00:00").split(':').map(Number);
        const hrs = (h2 + m2/60) - (h1 + m1/60);
        const pr = hrs >= 10 ? 54 : (hrs >= 6 ? 25 : 0);
        const total = (km * 0.55) + pr;
        
        if(e.type === 'Oy') oy += total; else tmi += total;

        html += `<div class="entry-item">
            <div>
                <b style="color:var(--ac)">${e.date}</b><br>
                <b>${e.title}</b><br>
                <small>${e.route} (${km} km)</small>
            </div>
            <div style="text-align:right">
                <b style="font-size:16px">${total.toFixed(2)} €</b><br>
                <span style="font-size:11px; font-weight:800; background:#eee; padding:2px 5px; border-radius:4px">${e.type}</span>
            </div>
        </div>`;
    });

    document.getElementById('summary-ui').innerHTML = `
        <div class="stat-card" style="border-left:10px solid var(--ac)">
            <h3 style="margin:0; font-size:12px; color:#666">OY MATKALASKUT</h3>
            <div style="font-size:32px; font-weight:900">${oy.toFixed(2)} €</div>
        </div>
        <div class="stat-card" style="border-left:10px solid var(--tmi)">
            <h3 style="margin:0; font-size:12px; color:#666">TMI VÄHENNYS</h3>
            <div style="font-size:32px; font-weight:900">${tmi.toFixed(2)} €</div>
        </div>`;
    document.getElementById('history-ui').innerHTML = html;
}

init();
</script>
</body>
</html>
