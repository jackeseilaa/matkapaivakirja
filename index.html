<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v4.6 PRO FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --danger: #ef4444; --success: #10b981; --oma: #8b5cf6; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; }
        
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .filter-btn { padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; font-weight: 800; font-size: 11px; cursor: pointer; color: #64748b; }
        .filter-btn.active[data-type="Oy"] { border-color: var(--ac); color: var(--ac); background: #eff6ff; }
        .filter-btn.active[data-type="Tmi"] { border-color: var(--success); color: var(--success); background: #f0fdf4; }
        .filter-btn.active[data-type="Oma"] { border-color: var(--oma); color: var(--oma); background: #f5f3ff; }

        .total-banner { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 20px; color: white; }
        .total-banner.Oy { background: var(--ac); }
        .total-banner.Tmi { background: var(--success); }
        .total-banner.Oma { background: var(--oma); }
        .total-banner span { font-size: 26px; font-weight: 800; display: block; }

        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid #ccc; }
        .history-item.Oy { border-left-color: var(--ac); }
        .history-item.Tmi { border-left-color: var(--success); }
        .history-item.Oma { border-left-color: var(--oma); }
        
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; background: white; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .report-table th { background: #f1f5f9; }

        @media print { .tabs, .filter-grid, .btn-main, #p-input, .btn-sub { display: none !important; } .page { display: block !important; } }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Koosteet</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportti</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <div class="form-group"><label>Päivämäärä</label><input type="date" id="f-date"></div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>Lähtö</label><input type="time" id="f-start"></div>
            <div style="flex:1"><label>Paluu</label><input type="time" id="f-end"></div>
        </div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <div class="form-group"><label>Kohde</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Reitti</label><input type="text" id="f-route"></div>
        <div class="form-group">
            <label>Päiväraha</label>
            <select id="f-perdiem">
                <option value="0">Ei päivärahaa</option>
                <option value="25">Osapäiväraha (25€)</option>
                <option value="54">Kokopäiväraha (54€)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tyyppi</label>
            <select id="f-type">
                <option value="Oy">Oy</option>
                <option value="Tmi">Tmi</option>
                <option value="Oma">Oma</option>
            </select>
        </div>
        <button class="btn-main" onclick="tallennaMatka()">TALLENNA MATKA</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div class="form-group">
        <label>Valitse kuukausi</label>
        <input type="month" id="filter-month" onchange="paivitaNakyma()">
    </div>
    
    <div class="filter-grid">
        <button class="filter-btn active" data-type="Oy" onclick="vaihdaTyyppi('Oy')">OY</button>
        <button class="filter-btn" data-type="Tmi" onclick="vaihdaTyyppi('Tmi')">TMI</button>
        <button class="filter-btn" data-type="Oma" onclick="vaihdaTyyppi('Oma')">OMA</button>
    </div>

    <div id="stat-banner" class="total-banner Oy">
        <small id="stat-label">OY YHTEENSÄ</small>
        <span id="stat-sum">0.00€</span>
    </div>

    <div id="history-ui"></div>
</div>

<div id="p-report" class="page">
    <button class="btn-main" style="background:var(--success); margin-bottom:15px" onclick="window.print()">TULOSTA PDF</button>
    <div id="report-content"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const KM_HINTA = 0.55;

let valittuTyyppi = 'Oy';
let fireAjot = [];

// TÄYSI HISTORIADATA TIEDOSTOISTASI
const ALKUVUOSI = [
    // Tammikuu
    { id: "j1", date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507284, ke: 507425, type: "Oy", perdiem: 54, start: "07:30", end: "19:00" },
    { id: "j2", date: "2026-01-14", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507425, ke: 507566, type: "Oy", perdiem: 54, start: "07:30", end: "18:30" },
    { id: "j3", date: "2026-01-19", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507566, ke: 507707, type: "Oy", perdiem: 54, start: "07:30", end: "19:00" },
    { id: "j4", date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 507707, ke: 507921, type: "Tmi", perdiem: 25, start: "10:30", end: "17:00" },
    // Helmikuu
    { id: "f1", date: "2026-02-02", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 509551, ke: 509692, type: "Oy", perdiem: 54, start: "06:30", end: "19:30" },
    { id: "f2", date: "2026-02-03", title: "Nokia Arena", route: "RMK-TRE-RMK", ks: 509692, ke: 509965, type: "Tmi", perdiem: 0 },
    { id: "f3", date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", ks: 511630, ke: 511771, type: "Oy", perdiem: 54 },
    { id: "f4", date: "2026-02-16", title: "Oma ajo", route: "Lappi tms", ks: 511771, ke: 512019, type: "Oma", perdiem: 0 },
    { id: "f5", date: "2026-02-17", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 512019, ke: 512161, type: "Oy", perdiem: 54 },
    { id: "f6", date: "2026-02-18", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 512161, ke: 512303, type: "Oy", perdiem: 54 },
    // Maaliskuu
    { id: "m1", date: "2026-03-02", title: "Taksi 142", route: "RMK-HKI-RMK", ks: 513079, ke: 513221, type: "Oy", perdiem: 54 },
    { id: "m2", date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 513221, ke: 513408, type: "Tmi", perdiem: 0 },
    { id: "m3", date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", ks: 514458, ke: 514610, type: "Tmi", perdiem: 54 }
];

function init() {
    const nyt = new Date();
    document.getElementById('filter-month').value = "2026-03"; // Oletuksena maaliskuu
    asetaNykyhetki();

    db.ref('ajot').on('value', (snap) => {
        const val = snap.val();
        fireAjot = val ? Object.values(val) : [];
        paivitaNakyma();
    });
}

function vaihdaTyyppi(t) {
    valittuTyyppi = t;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-type="${t}"]`).classList.add('active');
    paivitaNakyma();
}

function paivitaNakyma() {
    const month = document.getElementById('filter-month').value;
    let kaikki = [...fireAjot];
    ALKUVUOSI.forEach(h => { if(!kaikki.find(k => k.id === h.id)) kaikki.push(h); });

    // Suodatus
    const suodatetut = kaikki.filter(a => a.date.startsWith(month) && a.type === valittuTyyppi);
    suodatetut.sort((a,b) => b.date.localeCompare(a.date));

    let summa = 0;
    let html = "";

    suodatetut.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const raha = (km * KM_HINTA) + parseFloat(e.perdiem || 0);
        summa += raha;

        html += `
        <div class="history-item ${e.type}">
            <div style="display:flex; justify-content:space-between">
                <div>
                    <small>${e.date}</small><br>
                    <b>${e.title}</b><br><small>${e.route} (${km} km)</small>
                </div>
                <div style="text-align:right">
                    <b>${raha.toFixed(2)}€</b>
                </div>
            </div>
        </div>`;
    });

    document.getElementById('stat-banner').className = `total-banner ${valittuTyyppi}`;
    document.getElementById('stat-label').innerText = `${valittuTyyppi.toUpperCase()} YHTEENSÄ - ${month}`;
    document.getElementById('stat-sum').innerText = summa.toFixed(2) + "€";
    document.getElementById('history-ui').innerHTML = html || "<p style='text-align:center; opacity:0.5'>Ei tapahtumia.</p>";

    // KORJATTU RAPORTTI: Näyttää vain valitun tyypin
    paivitaRaportti(suodatetut, month, valittuTyyppi, summa);
}

function paivitaRaportti(ajot, month, tyyppi, kokonaissumma) {
    let rHtml = `
        <div style="border-bottom: 2px solid #000; padding-bottom:10px; margin-bottom:20px">
            <h2 style="margin:0">AJOPÄIVÄKIRJA: ${tyyppi}</h2>
            <p style="margin:5px 0">Kuukausi: ${month} | <b>Yhteensä: ${kokonaissumma.toFixed(2)}€</b></p>
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Pvm</th>
                    <th>Kohde</th>
                    <th>Reitti</th>
                    <th>KM</th>
                    <th>Päivär.</th>
                    <th>Yhteensä</th>
                </tr>
            </thead>
            <tbody>`;
    
    ajot.forEach(x => {
        const km = (x.ke - x.ks);
        const raha = (km * KM_HINTA) + parseFloat(x.perdiem || 0);
        rHtml += `
            <tr>
                <td>${x.date}</td>
                <td>${x.title}</td>
                <td>${x.route}</td>
                <td>${km}</td>
                <td>${x.perdiem}€</td>
                <td>${raha.toFixed(2)}€</td>
            </tr>`;
    });

    rHtml += `</tbody></table>
    <div style="margin-top:20px; text-align:right">
        <p>Kilometrikorvaus: 0.55€ / km</p>
        <h3>KAIKKI YHTEENSÄ (${tyyppi}): ${kokonaissumma.toFixed(2)} €</h3>
    </div>`;
    
    document.getElementById('report-content').innerHTML = rHtml;
}

function tallennaMatka() {
    const id = "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0,
        type: document.getElementById('f-type').value
    };
    db.ref('ajot/' + id).set(ajo).then(() => {
        alert("Tallennettu!");
        showPage('stats');
    });
}

function asetaNykyhetki() {
    const nyt = new Date();
    document.getElementById('f-date').value = nyt.toISOString().split('T')[0];
    document.getElementById('f-start').value = "08:00";
    document.getElementById('f-end').value = "16:00";
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

init();
</script>
</body>
</html>
