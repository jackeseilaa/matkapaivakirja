<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v4.9.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --danger: #ef4444; --success: #10b981; --oma: #8b5cf6; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .filter-btn { padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; font-weight: 800; font-size: 11px; cursor: pointer; color: #64748b; }
        .filter-btn.active[data-type="Oy"] { border-color: var(--ac); color: var(--ac); background: #eff6ff; }
        .filter-btn.active[data-type="Tmi"] { border-color: var(--success); color: var(--success); background: #f0fdf4; }
        .filter-btn.active[data-type="Oma"] { border-color: var(--oma); color: var(--oma); background: #f5f3ff; }
        .total-banner { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 20px; color: white; }
        .total-banner.Oy { background: var(--ac); }
        .total-banner.Tmi { background: var(--success); }
        .total-banner.Oma { background: var(--oma); }
        .total-banner span { font-size: 26px; font-weight: 800; display: block; }
        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        .btn-sub { background: #f1f5f9; color: #475569; border: none; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; width: 100%; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-left: 5px solid #ccc; }
        .history-item.Oy { border-left-color: var(--ac); }
        .history-item.Tmi { border-left-color: var(--success); }
        .history-item.Oma { border-left-color: var(--oma); }
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Koosteet</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportti</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <div class="form-group"><label>Päivämäärä</label><input type="date" id="f-date"></div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>Lähtö</label><input type="time" id="f-start"></div>
            <div style="flex:1"><label>Paluu</label><input type="time" id="f-end"></div>
        </div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <div class="form-group"><label>Kohde</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Reitti</label><input type="text" id="f-route"></div>
        <div class="form-group">
            <label>Päiväraha</label>
            <select id="f-perdiem">
                <option value="0">Ei päivärahaa</option>
                <option value="25">Osapäiväraha (25€)</option>
                <option value="54">Kokopäiväraha (54€)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tyyppi</label>
            <select id="f-type">
                <option value="Oy">Oy</option>
                <option value="Tmi">Tmi</option>
                <option value="Oma">Oma</option>
            </select>
        </div>
        <button class="btn-main" id="save-btn" onclick="tallennaMatka()">TALLENNA MATKA</button>
        <button class="btn-sub" onclick="resetForm()">TYHJENNÄ / NYKYHETKI</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div class="form-group"><label>Kuukausi</label><input type="month" id="filter-month" onchange="paivitaNakyma()"></div>
    <div class="filter-grid">
        <button class="filter-btn active" data-type="Oy" onclick="vaihdaTyyppi('Oy')">OY</button>
        <button class="filter-btn" data-type="Tmi" onclick="vaihdaTyyppi('Tmi')">TMI</button>
        <button class="filter-btn" data-type="Oma" onclick="vaihdaTyyppi('Oma')">OMA</button>
    </div>
    <div id="stat-banner" class="total-banner Oy"><small id="stat-label">OY YHTEENSÄ</small><span id="stat-sum">0.00€</span></div>
    <div id="history-ui"></div>
</div>

<div id="p-report" class="page">
    <button class="btn-main" style="background:var(--success)" onclick="window.print()">TULOSTA PDF</button>
    <div id="report-content"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const KM_HINTA = 0.55;

let valittuTyyppi = 'Oy';
let omatAjot = JSON.parse(localStorage.getItem('paivuri_data')) || [];

// Historia tiedostoistasi
const ALKUHISTORIA = [
    { id: "j1", date: "2026-01-12", title: "Taksi", route: "RMK-HKI-RMK", ks: 507284, ke: 507425, type: "Oy", perdiem: 54, start: "07:30", end: "19:00" },
    { id: "j2", date: "2026-01-14", title: "Taksi", route: "RMK-HKI-RMK", ks: 507425, ke: 507566, type: "Oy", perdiem: 54, start: "07:30", end: "18:30" },
    { id: "j3", date: "2026-01-19", title: "Taksi", route: "RMK-HKI-RMK", ks: 507566, ke: 507707, type: "Oy", perdiem: 54, start: "07:30", end: "19:00" },
    { id: "j4", date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 507707, ke: 507921, type: "Tmi", perdiem: 25, start: "10:30", end: "17:00" },
    { id: "f1", date: "2026-02-02", title: "Taksi", route: "RMK-HKI-RMK", ks: 509551, ke: 509692, type: "Oy", perdiem: 54, start: "06:30", end: "19:30" },
    { id: "f2", date: "2026-02-03", title: "Nokia Arena", route: "RMK-TRE-RMK", ks: 509692, ke: 509965, type: "Tmi", perdiem: 0, start: "08:00", end: "16:00" },
    { id: "f3", date: "2026-02-12", title: "Venemessut", route: "RMK-HKI-RMK", ks: 511630, ke: 511771, type: "Oy", perdiem: 0, start: "09:00", end: "19:30" },
    { id: "f4", date: "2026-02-16", title: "Oma ajo", route: "RMK-Mökki", ks: 511771, ke: 512019, type: "Oma", perdiem: 0 },
    { id: "f5", date: "2026-02-17", title: "Taksi", route: "RMK-HKI-RMK", ks: 512019, ke: 512161, type: "Oy", perdiem: 54, start: "05:50", end: "18:00" },
    { id: "f6", date: "2026-02-18", title: "Taksi", route: "RMK-HKI-RMK", ks: 512161, ke: 512303, type: "Oy", perdiem: 54, start: "04:50", end: "18:00" },
    { id: "m1", date: "2026-03-02", title: "Taksi", route: "RMK-HKI-RMK", ks: 513079, ke: 513221, type: "Oy", perdiem: 54, start: "05:00", end: "18:00" },
    { id: "m2", date: "2026-03-04", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 513221, ke: 513408, type: "Tmi", perdiem: 0, start: "08:00", end: "16:00" },
    { id: "m3", date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", ks: 514458, ke: 514610, type: "Tmi", perdiem: 54, start: "07:20", end: "17:30" }
];

function init() {
    document.getElementById('filter-month').value = "2026-03";
    asetaNykyhetki();
    db.ref('ajot').on('value', (snap) => {
        const val = snap.val();
        if(val) {
            Object.values(val).forEach(f => {
                if(!omatAjot.find(o => o.id === f.id)) omatAjot.push(f);
            });
            paivitaNakyma();
        }
    });
    paivitaNakyma();
}

function tallennaMatka() {
    const id = document.getElementById('f-id').value || "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0,
        type: document.getElementById('f-type').value
    };

    const index = omatAjot.findIndex(a => a.id === id);
    if(index > -1) omatAjot[index] = ajo; else omatAjot.push(ajo);
    localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
    db.ref('ajot/' + id).set(ajo);

    alert("Tallennettu!");
    resetForm();
    paivitaNakyma();
}

function resetForm() {
    document.getElementById('f-id').value = "";
    document.getElementById('f-ks').value = "";
    document.getElementById('f-ke').value = "";
    document.getElementById('f-title').value = "";
    document.getElementById('f-route').value = "";
    document.getElementById('f-perdiem').value = "0";
    document.getElementById('save-btn').innerText = "TALLENNA MATKA";
    asetaNykyhetki();
}

function asetaNykyhetki() {
    const nyt = new Date();
    const pvm = nyt.toISOString().split('T')[0];
    const tunnit = String(nyt.getHours()).padStart(2, '0');
    const minuutit = String(nyt.getMinutes()).padStart(2, '0');
    document.getElementById('f-date').value = pvm;
    document.getElementById('f-start').value = tunnit + ":" + minuutit;
    document.getElementById('f-end').value = tunnit + ":" + minuutit;
}

function paivitaNakyma() {
    const month = document.getElementById('filter-month').value;
    let kaikki = [...ALKUHISTORIA];
    omatAjot.forEach(o => {
        const i = kaikki.findIndex(k => k.id === o.id);
        if(i > -1) kaikki[i] = o; else kaikki.push(o);
    });

    const suodatetut = kaikki.filter(a => a.date.startsWith(month) && a.type === valittuTyyppi);
    suodatetut.sort((a,b) => b.date.localeCompare(a.date));

    let summa = 0;
    let html = "";
    suodatetut.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const raha = (km * KM_HINTA) + parseFloat(e.perdiem || 0);
        summa += raha;
        html += `<div class="history-item ${e.type}">
            <div style="display:flex; justify-content:space-between">
                <div><small>${e.date}</small> | <b>${e.title}</b><br><small>${e.route} (${km} km)</small></div>
                <div style="text-align:right"><b>${raha.toFixed(2)}€</b></div>
            </div>
            <div style="margin-top:10px; display:flex; gap:5px">
                <button style="flex:1; padding:5px; font-size:10px" onclick="muokkaa('${e.id}')">Muokkaa</button>
                <button style="flex:1; padding:5px; font-size:10px; color:red" onclick="poista('${e.id}')">Poista</button>
            </div>
        </div>`;
    });

    document.getElementById('stat-banner').className = `total-banner ${valittuTyyppi}`;
    document.getElementById('stat-sum').innerText = summa.toFixed(2) + "€";
    document.getElementById('history-ui').innerHTML = html || "<p style='text-align:center; opacity:0.5'>Ei tietoja.</p>";
}

function muokkaa(id) {
    const a = [...ALKUHISTORIA, ...omatAjot].find(x => x.id == id);
    if(!a) return;
    document.getElementById('f-id').value = a.id;
    document.getElementById('f-date').value = a.date;
    document.getElementById('f-start').value = a.start || "08:00";
    document.getElementById('f-end').value = a.end || "16:00";
    document.getElementById('f-ks').value = a.ks;
    document.getElementById('f-ke').value = a.ke;
    document.getElementById('f-title').value = a.title;
    document.getElementById('f-route').value = a.route;
    document.getElementById('f-perdiem').value = a.perdiem;
    document.getElementById('f-type').value = a.type;
    document.getElementById('save-btn').innerText = "PÄIVITÄ MERKINTÄ";
    showPage('input');
}

function poista(id) {
    if(confirm("Poistetaanko?")) {
        omatAjot = omatAjot.filter(a => a.id !== id);
        localStorage.setItem('paivuri_data', JSON.stringify(omatAjot));
        db.ref('ajot/' + id).remove();
        paivitaNakyma();
    }
}

function vaihdaTyyppi(t) {
    valittuTyyppi = t;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-type="${t}"]`).classList.add('active');
    paivitaNakyma();
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

init();
</script>
</body>
</html>
