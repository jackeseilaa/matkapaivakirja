<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Päivyri v4.5 ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --ac: #2563eb; --danger: #ef4444; --success: #10b981; --oma: #8b5cf6; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--ac); border-bottom: 4px solid var(--ac); background: #f1f5f9; }
        
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        .card { background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; font-weight: 600; box-sizing: border-box; font-family: inherit; }
        
        /* Kooste-napit */
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .filter-btn { padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; background: #fff; font-weight: 800; font-size: 12px; cursor: pointer; color: #64748b; }
        .filter-btn.active[data-type="Oy"] { border-color: var(--ac); color: var(--ac); background: #eff6ff; }
        .filter-btn.active[data-type="Tmi"] { border-color: var(--success); color: var(--success); background: #f0fdf4; }
        .filter-btn.active[data-type="Oma"] { border-color: var(--oma); color: var(--oma); background: #f5f3ff; }

        .total-banner { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 20px; color: white; transition: 0.3s; }
        .total-banner.Oy { background: var(--ac); }
        .total-banner.Tmi { background: var(--success); }
        .total-banner.Oma { background: var(--oma); }
        .total-banner span { font-size: 24px; font-weight: 800; display: block; }

        .btn-main { background: #000; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; font-size: 14px; cursor: pointer; }
        .history-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        
        @media print { .tabs, .filter-grid, .btn-main, .actions, #p-input { display: none !important; } .page { display: block !important; } }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" id="t-input" onclick="showPage('input')">Syöte</div>
    <div class="tab" id="t-stats" onclick="showPage('stats')">Koosteet</div>
    <div class="tab" id="t-report" onclick="showPage('report')">Raportti</div>
</div>

<div id="p-input" class="page active">
    <div class="card">
        <input type="hidden" id="f-id">
        <div class="form-group"><label>Päivämäärä</label><input type="date" id="f-date"></div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>Lähtö</label><input type="time" id="f-start"></div>
            <div style="flex:1"><label>Paluu</label><input type="time" id="f-end"></div>
        </div>
        <div style="display:flex; gap:10px" class="form-group">
            <div style="flex:1"><label>KM Alku</label><input type="number" id="f-ks"></div>
            <div style="flex:1"><label>KM Loppu</label><input type="number" id="f-ke"></div>
        </div>
        <div class="form-group"><label>Kohde / Asiakas</label><input type="text" id="f-title"></div>
        <div class="form-group"><label>Reitti</label><input type="text" id="f-route"></div>
        <div class="form-group">
            <label>Päiväraha (2026)</label>
            <select id="f-perdiem">
                <option value="0">Ei päivärahaa</option>
                <option value="25">Osapäiväraha (>6h) 25€</option>
                <option value="54">Kokopäiväraha (>10h) 54€</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tyyppi</label>
            <select id="f-type">
                <option value="Oy">Oy (Matkalasku)</option>
                <option value="Tmi">Tmi (Vähennys)</option>
                <option value="Oma">Oma (Yksityisajo)</option>
            </select>
        </div>
        <button class="btn-main" onclick="tallennaMatka()">TALLENNA MATKA</button>
    </div>
</div>

<div id="p-stats" class="page">
    <div class="form-group">
        <label>Valitse kuukausi</label>
        <input type="month" id="filter-month" onchange="paivitaNakyma()">
    </div>
    
    <div class="filter-grid">
        <button class="filter-btn active" data-type="Oy" onclick="vaihdaTyyppi('Oy')">OY</button>
        <button class="filter-btn" data-type="Tmi" onclick="vaihdaTyyppi('Tmi')">TMI</button>
        <button class="filter-btn" data-type="Oma" onclick="vaihdaTyyppi('Oma')">OMA</button>
    </div>

    <div id="stat-banner" class="total-banner Oy">
        <small id="stat-label">OY YHTEENSÄ</small>
        <span id="stat-sum">0.00€</span>
    </div>

    <div id="history-ui"></div>
</div>

<div id="p-report" class="page">
    <button class="btn-main" style="background:var(--success); margin-bottom:20px" onclick="window.print()">TULOSTA RAPORTTI</button>
    <div id="report-content"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const KM_HINTA = 0.55;

let valittuTyyppi = 'Oy';
let fireAjot = [];

// Hardcoded data (Maaliskuu 2026 asti)
const ALKUVUOSI = [
    { id: "c1", date: "2026-01-12", title: "Taksi 141", route: "RMK-HKI-RMK", ks: 507284, ke: 507425, type: "Oy", perdiem: 54 },
    { id: "c4", date: "2026-01-20", title: "Vakuutus", route: "RMK-TRE-RMK", ks: 507707, ke: 507921, type: "Tmi", perdiem: 25 },
    { id: "c10", date: "2026-03-11", title: "Agentti", route: "RMK-LAHTI-RMK", ks: 514458, ke: 514610, type: "Tmi", perdiem: 54 }
];

function init() {
    const nyt = new Date();
    document.getElementById('filter-month').value = nyt.toISOString().slice(0, 7);
    asetaNykyhetki();

    db.ref('ajot').on('value', (snap) => {
        const val = snap.val();
        fireAjot = val ? Object.values(val) : [];
        paivitaNakyma();
    });
}

function vaihdaTyyppi(t) {
    valittuTyyppi = t;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-type="${t}"]`).classList.add('active');
    paivitaNakyma();
}

function paivitaNakyma() {
    const month = document.getElementById('filter-month').value; // Muoto: "2026-03"
    let kaikki = [...fireAjot];
    ALKUVUOSI.forEach(h => { if(!kaikki.find(k => k.id === h.id)) kaikki.push(h); });

    // Suodatus: Kuukausi JA Tyyppi
    const suodatetut = kaikki.filter(a => a.date.startsWith(month) && a.type === valittuTyyppi);
    suodatetut.sort((a,b) => b.date.localeCompare(a.date));

    let summa = 0;
    let html = "";

    suodatetut.forEach(e => {
        const km = (e.ke - e.ks) || 0;
        const raha = (km * KM_HINTA) + parseFloat(e.perdiem || 0);
        summa += raha;

        html += `
        <div class="history-item">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <small>${e.date}</small><br>
                    <b>${e.title}</b><br><small>${e.route} (${km} km)</small>
                </div>
                <div style="text-align:right">
                    <b style="color:var(--ac)">${raha.toFixed(2)}€</b><br>
                    <button class="btn-sub" style="font-size:9px; margin-top:5px" onclick="vieGoogleen('${e.id}')">KALENTERIIN</button>
                </div>
            </div>
        </div>`;
    });

    // Päivitä banneri
    const banner = document.getElementById('stat-banner');
    banner.className = `total-banner ${valittuTyyppi}`;
    document.getElementById('stat-label').innerText = `${valittuTyyppi.toUpperCase()} - ${month}`;
    document.getElementById('stat-sum').innerText = summa.toFixed(2) + "€";
    document.getElementById('history-ui').innerHTML = html || "<p style='text-align:center; opacity:0.5'>Ei tapahtumia tälle valinnalle.</p>";

    // Päivitä raportti (kaikki tyypit kuukaudelta)
    paivitaRaportti(kaikki, month);
}

function paivitaRaportti(kaikki, month) {
    let rHtml = `<h2>RAPORTTI: ${month}</h2>`;
    ['Oy', 'Tmi', 'Oma'].forEach(t => {
        const ajot = kaikki.filter(a => a.date.startsWith(month) && a.type === t);
        if(ajot.length > 0) {
            rHtml += `<h3>${t}</h3><table style="width:100%; border-collapse:collapse; font-size:12px" border="1">
            <tr><th>Pvm</th><th>Kohde</th><th>KM</th><th>€</th></tr>`;
            ajot.forEach(x => {
                const k = (x.ke-x.ks);
                const r = (k*KM_HINTA) + parseFloat(x.perdiem||0);
                rHtml += `<tr><td>${x.date}</td><td>${x.title}</td><td>${k}</td><td>${r.toFixed(2)}€</td></tr>`;
            });
            rHtml += `</table>`;
        }
    });
    document.getElementById('report-content').innerHTML = rHtml;
}

function tallennaMatka() {
    const id = "id_" + Date.now();
    const ajo = {
        id: id,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        ks: parseFloat(document.getElementById('f-ks').value) || 0,
        ke: parseFloat(document.getElementById('f-ke').value) || 0,
        title: document.getElementById('f-title').value || "Ajo",
        route: document.getElementById('f-route').value || "-",
        perdiem: parseFloat(document.getElementById('f-perdiem').value) || 0,
        type: document.getElementById('f-type').value
    };
    db.ref('ajot/' + id).set(ajo).then(() => {
        alert("Tallennettu!");
        showPage('stats');
    });
}

function vieGoogleen(id) {
    let kaikki = [...fireAjot, ...ALKUVUOSI];
    const a = kaikki.find(x => x.id == id);
    const d = a.date.replace(/-/g, '');
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(a.title)}&dates=${d}T080000Z/${d}T090000Z&details=${encodeURIComponent(a.route)}`;
    window.open(url, '_blank');
}

function asetaNykyhetki() {
    const nyt = new Date();
    document.getElementById('f-date').value = nyt.toISOString().split('T')[0];
    document.getElementById('f-start').value = "08:00";
    document.getElementById('f-end').value = "16:00";
}

function showPage(p) {
    document.querySelectorAll('.page, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
}

init();
</script>
</body>
</html>
