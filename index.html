<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Päivyri - DATAN ETSINTÄ</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Sora', sans-serif; padding: 20px; background: #f1f5f9; color: #0f172a; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .found-item { border-left: 4px solid #2563eb; padding: 10px; margin: 10px 0; background: #f8fafc; font-size: 14px; }
        .folder-tag { font-size: 10px; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status { color: #64748b; font-size: 12px; margin-bottom: 10px; }
        h2 { margin-top: 0; color: #2563eb; }
    </style>
</head>
<body>

<div class="box">
    <h2>Datan etsintä käynnissä...</h2>
    <div id="status" class="status">Yhdistetään Firebaseen...</div>
    <div id="results"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://paivuri-6379b-default-rtdb.europe-west1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const resultsDiv = document.getElementById('results');
const statusDiv = document.getElementById('status');

// ETSITÄÄN KOKO TIETOKANTA (JUURI /)
db.ref('/').on('value', (snapshot) => {
    const allData = snapshot.val();
    resultsDiv.innerHTML = "";
    
    if (!allData) {
        statusDiv.innerText = "Tietokanta on täysin tyhjä (/).";
        return;
    }

    statusDiv.innerText = "Tietokannasta löytyi sisältöä. Analysoidaan...";
    let foundCount = 0;

    // Käydään läpi kaikki pääkansiot (esim. 'ajot', 'data', 'merkinnat')
    for (let folder in allData) {
        const folderContent = allData[folder];
        
        if (typeof folderContent === 'object') {
            // Muutetaan kansion sisältö listaksi
            const items = Object.values(folderContent);
            
            items.forEach(item => {
                // Tarkistetaan, näyttääkö tämä ajopäiväkirja-merkinnältä
                if (item && (item.date || item.client || item.ks)) {
                    foundCount++;
                    const div = document.createElement('div');
                    div.className = 'found-item';
                    div.innerHTML = `
                        <span class="folder-tag">Kansio: ${folder}</span><br>
                        <b>PVM:</b> ${item.date || '---'} | <b>Asiakas:</b> ${item.client || '---'}<br>
                        <small>ID: ${item.id || 'ei id:tä'}</small>
                    `;
                    resultsDiv.appendChild(div);
                }
            });
        }
    }

    if (foundCount === 0) {
        resultsDiv.innerHTML = "<p>Dataa ei tunnistettu. Tietokannassa on jotain, mutta se ei vastaa odotettua muotoa.</p>";
    } else {
        statusDiv.innerText = `Löytyi yhteensä ${foundCount} merkintää!`;
    }
}, (error) => {
    statusDiv.innerText = "Virhe yhteydessä: " + error.message;
});
</script>
</body>
</html>
